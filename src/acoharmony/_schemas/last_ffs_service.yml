version: 2
name: last_ffs_service
description: Pre-computed most recent FFS service dates for beneficiaries with valid
  provider matches
storage:
  tier: silver
  staged_from: cclf5
  silver:
    output_name: last_ffs_service.parquet
    refresh_frequency: continuous
    last_updated_by: aco transform last_ffs_service
columns:
- name: bene_mbi
  type: String
  description: Beneficiary Medicare Beneficiary Identifier
  required: true
- name: last_ffs_date
  type: Date
  description: Most recent date of FFS service for this beneficiary
  required: true
- name: last_ffs_tin
  type: String
  description: Provider TIN from most recent FFS service
  required: true
- name: last_ffs_npi
  type: String
  description: Provider NPI from most recent FFS service
  required: true
- name: claim_count
  type: UInt32
  description: Total number of claims for this beneficiary from valid providers
  required: true
processing:
  chunk_size: 1000000
  output_format: parquet
  compression: snappy
metadata:
  purpose: 'This table pre-computes the most recent FFS service dates and provider
    information

    for each beneficiary by joining CCLF5 claims data with the provider list to identify

    valid providers. This is used for MSSP provider attribution in consolidated_alignment.

    '
  usage: 'Used by consolidated_alignment pipeline for MSSP provider attribution.

    Contains one row per beneficiary with their most recent FFS service date and provider.

    '
  refresh_frequency: continuous
  data_source: CCLF5 claims matched with valid provider TINs
medallion_layer: silver
unity_catalog: main
