version: 2
name: prospective_plus_opportunity_report
description: 'Prospective Plus Opportunity Report'
storage:
  tier: bronze
  file_patterns:
    reach:
    - '*PPOPR*'
  silver:
    output_name: prospective_plus_opportunity_report.parquet
    refresh_frequency: monthly
file_format:
  type: excel
  parser: excel
  skip_rows: 5
  # Single-sheet Excel file containing prospective plus opportunity data
  # File structure:
  # - Row 1: Report title "Prospective Plus Opportunity Report"
  # - Row 2: ACO ID metadata
  # - Row 3: ACO Type metadata
  # - Row 4: Note about CMS cell suppression policy with page range
  # - Row 5: Section header "Total FFS Beneficiaries Eligible for Prospective Plus Alignment in the ESA"
  # - Row 6: Column headers (COUNTY, STATE, FIPS, Count of Beneficiaries)
  # - Rows 7+: County-level beneficiary counts
columns:
  - name: county
    type: string
    description: County name
  - name: state
    type: string
    description: State abbreviation (2-letter code)
  - name: fips
    type: string
    description: FIPS county code (5-digit)
  - name: count_of_beneficiaries
    type: integer
    description: Total FFS beneficiaries eligible for Prospective Plus alignment in the county (may be 'SUPPRESSED' if 10 or fewer)
fourIcli:
  category: Beneficiary List
  fileTypeCode: 170
  extractZip: false
  refreshFrequency: monthly
  filePattern: P.D????.PPOPR.Q?.D??????.T*.xlsx
