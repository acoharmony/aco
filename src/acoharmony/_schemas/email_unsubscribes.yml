name: email_unsubscribes
description: Email unsubscribe and complaint events tracking
version: 1.0.0
file_format:
  type: json
  encoding: utf-8
storage:
  tier: bronze
  file_patterns:
    main: aco_compliance___email_unsubscribes*.json
  silver:
    output_name: email_unsubscribes.parquet
    refresh_frequency: monthly
    last_updated_by: aco transform email_unsubscribes
transformations:
- type: extract_year_quarter
  field: campaign_name
  pattern: (\d{4}) Q(\d)
  output_fields:
  - campaign_year
  - campaign_quarter
- type: extract_domain
  field: email
  output_field: email_domain
- type: deduplication
  keys:
  - email_id
  - patient_id
  - event_name
output:
  format: parquet
  partition_by:
  - campaign_year
  - campaign_quarter
  - event_name
  compression: snappy
metadata:
  tags:
  - compliance
  - email-campaigns
  - unsubscribes
  - complaints
  business_owner: ACO Compliance Team
  data_classification: PHI
  refresh_frequency: monthly
medallion_layer: bronze
unity_catalog: main
columns:
- name: campaign_name
  source_name: Campaign Name
  type: string
  description: Campaign name (e.g., "2023 Q3 ACO Voluntary Alignment Campaign (EN)")
  required: true
- name: email
  source_name: Email
  type: string
  description: Patient email address
  required: true
  pii: true
- name: email_id
  source_name: Email ID
  type: string
  description: Unique email identifier (UUID)
  required: true
- name: event_name
  source_name: Event Name
  type: string
  description: Type of event (unsubscribed, complained)
  required: true
  enum:
  - unsubscribed
  - complained
- name: network_id
  source_name: Network ID
  type: string
  description: Network/ACO name
  required: true
- name: patient_id
  source_name: Patient ID
  type: string
  description: Patient identifier (UUID)
  required: true
  pii: true
- name: patient_name
  source_name: Patient Name
  type: string
  description: Patient full name
  required: true
  pii: true
- name: practice_id
  source_name: Practice ID
  type: string
  description: Medical practice identifier
  required: true
