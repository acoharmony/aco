version: 2
name: quarterly_quality_report
description: Quarterly Quality Report - REACH ACO quarterly quality performance feedback
storage:
  tier: bronze
  file_patterns:
    reach:
    - '*QTLQR*'
  silver:
    output_name: quarterly_quality_report.parquet
    refresh_frequency: monthly
file_format:
  type: excel_multi_sheet
  parser: excel_multi_sheet
  multi_output: true
  sheet_config:
    header_row: 8
    data_start_row: 9
    column_mapping_strategy: position
    end_marker_column: 0
    end_marker_value: ''
columns:
- name: sheet_type
  data_type: string
  description: Sheet type identifier
sheets:
- sheet_index: 0
  sheet_type: documentation
  description: Cover - documentation sheet
- sheet_index: 1
  sheet_type: documentation
  description: Table of Contents - documentation sheet
- sheet_index: 2
  sheet_type: documentation
  description: Glossary - documentation sheet
- sheet_index: 3
  sheet_type: documentation
  description: About This Report - documentation sheet
- sheet_index: 4
  sheet_type: parameters
  description: Parameters - reporting parameters and metadata
  header_row: 2
  data_start_row: 3
  columns:
  - name: parameter_name
    position: 0
    data_type: string
    description: Parameter name (e.g., Reporting Period, ACO Type, HCC Version)
  - name: parameter_value
    position: 1
    data_type: string
    description: Parameter value
- sheet_index: 5
  sheet_type: claims_results
  description: Tables 1a-1b - Claims-Based Quality Measure Results and Concurrent
    Benchmarks
  header_row: 8
  data_start_row: 9
  columns:
  - name: measure
    position: 0
    data_type: string
    description: Quality measure code (ACR, UAMCC, DAH)
  - name: measure_name
    position: 1
    data_type: string
    description: Full measure name with performance direction
  - name: quality_measure_score
    position: 4
    data_type: float
    description: ACO's quality measure performance score
  - name: measure_volume
    position: 5
    data_type: float
    description: ACO's measure volume (beneficiary count or other volume metric)
  - name: mean_quality_score
    position: 6
    data_type: float
    description: Mean quality measure score across all ACOs and other provider groups
  - name: provisional_measure_percentile
    position: 7
    data_type: float
    description: ACO's provisional measure percentile rank
  - name: highest_provisional_benchmark
    position: 8
    data_type: string
    description: Highest provisional benchmark threshold met (e.g., 15th, 50th, 90th)
- sheet_index: 6
  sheet_type: documentation
  description: About Stratified Reporting - documentation sheet
- sheet_index: 7
  sheet_type: stratified_reporting
  description: Tables 2-4 - Stratified Reporting by Dual Eligibility, Socioeconomic
    Status, and Race
  header_row:
  - 8
  - 9
  - 10
  data_start_row: 11
  columns:
  - name: measure
    position: 0
    data_type: string
    description: Quality measure code (ACR-Equity Version, UAMCC, DAH-DIC Component)
  - name: measure_name
    position: 1
    data_type: string
    description: Full measure name with performance direction
  - name: stratified_measure_volume
    position: 2
    data_type: float
    description: Measure volume for stratified population (Your ACO)
  - name: stratified_measure_score
    position: 3
    data_type: float
    description: Measure score for stratified population (Your ACO)
  - name: stratified_mean_score
    position: 4
    data_type: float
    description: Mean measure score for stratified population (All ACOs and Other
      Provider Groups)
  - name: all_beneficiaries_mean_score
    position: 6
    data_type: float
    description: Mean measure score for all beneficiaries (All ACOs and Other Provider
      Groups)
fourIcli:
  category: Reports
  fileTypeCode: 176
  extractZip: false
  refreshFrequency: monthly
  filePattern: P.D????.QTLQR.Q?.D??????.T*.xlsx
