version: 2
name: eligibility
description: Member eligibility and enrollment spans
staging: enrollment
storage:
  tier: gold
  output_name: eligibility.parquet
standardization:
  rename_columns:
    member_id: member_id
    person_id: person_id
    enrollment_start_date: enrollment_start_date
    enrollment_end_date: enrollment_end_date
  ensure_columns:
  - name: payer
    default: Medicare
  - name: payer_type
    default: Medicare
  - name: plan
    default: ACO
  add_columns:
  - name: source_file
    value: eligibility
columns:
- name: person_id
  description: Person identifier
  data_type: string
  required: true
- name: member_id
  description: Member identifier (Medicare Beneficiary Identifier)
  data_type: string
  required: true
- name: enrollment_start_date
  description: Start date of enrollment period
  data_type: date
  required: true
- name: enrollment_end_date
  description: End date of enrollment period
  data_type: date
  required: true
- name: payer
  description: Payer name
  data_type: string
  required: true
  default: Medicare
- name: payer_type
  description: Type of payer
  data_type: string
  default: Medicare
- name: plan
  description: Insurance plan
  data_type: string
  default: ACO
- name: gender
  description: Member gender
  data_type: string
- name: gender_name
  description: Gender description
  data_type: string
- name: birth_date
  description: Member birth date
  data_type: date
- name: death_date
  description: Member death date (if applicable)
  data_type: date
- name: death_flag
  description: Indicates if member is deceased
  data_type: integer
  derived: CASE WHEN death_date IS NOT NULL THEN 1 ELSE 0 END
- name: race
  description: Member race
  data_type: string
- name: race_name
  description: Race description
  data_type: string
- name: ethnicity
  description: Member ethnicity
  data_type: string
- name: ethnicity_name
  description: Ethnicity description
  data_type: string
- name: state
  description: State code
  data_type: string
- name: state_name
  description: State name
  data_type: string
- name: zip_code
  description: ZIP code
  data_type: string
- name: county
  description: County code
  data_type: string
- name: county_name
  description: County name
  data_type: string
- name: latitude
  description: Geographic latitude
  data_type: decimal
- name: longitude
  description: Geographic longitude
  data_type: decimal
- name: dual_status_code
  description: Medicare/Medicaid dual eligibility status
  data_type: string
- name: dual_status_description
  description: Dual status description
  data_type: string
- name: medicare_status_code
  description: Medicare enrollment status
  data_type: string
- name: medicare_status_description
  description: Medicare status description
  data_type: string
- name: original_reason_entitlement_code
  description: Original reason for Medicare entitlement
  data_type: string
- name: original_reason_entitlement_description
  description: Original reason description
  data_type: string
- name: mssp_enrolled
  description: Currently enrolled in MSSP
  data_type: boolean
- name: reach_enrolled
  description: Currently enrolled in REACH
  data_type: boolean
- name: current_program
  description: Current ACO program
  data_type: string
- name: data_source
  description: Source of the data
  data_type: string
  default: CCLF
- name: processed_date
  description: Date record was processed
  data_type: timestamp
medallion_layer: gold
unity_catalog: main
