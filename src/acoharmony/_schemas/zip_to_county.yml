version: 2
name: zip_to_county
description: ZIP code to county mapping with geographic coordinates
file_format:
  type: parquet
  encoding: utf-8
columns:
- name: zip_code
  output_name: zip_code
  description: 5-digit ZIP code
  data_type: string
  required: true
- name: county_name
  output_name: county_name
  description: County name
  data_type: string
  required: true
- name: county_fips
  output_name: county_fips
  description: County FIPS code
  data_type: string
  required: true
- name: state_code
  output_name: state_code
  description: State abbreviation
  data_type: string
  required: true
- name: state_name
  output_name: state_name
  description: State full name
  data_type: string
- name: latitude
  output_name: latitude
  description: Latitude coordinate
  data_type: decimal
  precision: 6
- name: longitude
  output_name: longitude
  description: Longitude coordinate
  data_type: decimal
  precision: 6
storage:
  bronze:
    output_name: zip_to_county.parquet
  silver:
    output_name: zip_to_county.parquet
  gold:
    output_name: zip_to_county.parquet
medallion_layer: bronze
unity_catalog: main
