version: 3
name: hdai_reach
description: HDAI REACH data - Excel file containing beneficiary information and spending
  metrics
storage:
  tier: silver
  file_patterns:
    hdai:
    - HC REACH Report*.xlsx
    - HC Reach Report*.xlsx
    - HC REACH Report ????-??-??.xlsx
    - HC Reach Report ????-??-??.xlsx
    - HC Reach Report ????-??-??_v2.xlsx
    - HC Reach Report ????-??-?? ????.xlsx
  bronze:
    output_name: hdai_reach.parquet
  silver:
    staged_from: hdai_reach  # bronze output becomes silver input
    output_name: hdai_reach.parquet
    refresh_frequency: monthly
file_format:
  type: excel
  sheet_name:
    - Patient Level
    - HC Reach Report ????-??-??
    - HC Reach Report *
    - HC Reach Report
  encoding: utf-8
  skip_rows: 0
  header_row: auto
columns:
- name: MBI
  output_name: mbi
  description: Medicare Beneficiary Identifier
  data_type: string
  required: true
- name: Patient First Name
  output_name: patient_first_name
  description: Patient's first name
  data_type: string
- name: Patient Last Name
  output_name: patient_last_name
  description: Patient's last name
  data_type: string
- name: Patient DOB
  output_name: patient_dob
  description: Patient date of birth
  data_type: date
  date_format:
  - '%Y-%m-%d'
  - '%m/%d/%Y'
  - '%-m/%-d/%Y'
- name: Patient DOD
  output_name: patient_dod
  description: Patient date of death (if applicable)
  data_type: date
  required: false
  date_format:
  - '%Y-%m-%d'
  - '%m/%d/%Y'
  - '%-m/%-d/%Y'
- name: Patient Address
  output_name: patient_address
  description: Patient street address
  data_type: string
- name: Patient City
  output_name: patient_city
  description: Patient city
  data_type: string
- name: Patient State
  output_name: patient_state
  description: Patient state code
  data_type: string
- name: Patient Zip
  output_name: patient_zip
  description: Patient ZIP code
  data_type: string
- name: Enrollment Status
  output_name: enrollment_status
  description: Current enrollment status
  data_type: string
- name: NPI
  output_name: plurality_assigned_provider_npi
  description: NPI of the plurality assigned provider
  data_type: string
- name: NPI Name
  output_name: plurality_assigned_provider_name
  description: Name of the plurality assigned provider
  data_type: string
- name: B Carrier Cost
  output_name: b_carrier_cost
  description: Part B carrier costs
  data_type: decimal
- name: DME Spend YTD
  output_name: dme_spend_ytd
  description: Durable Medical Equipment spending year-to-date
  data_type: decimal
- name: Hospice Spend YTD
  output_name: hospice_spend_ytd
  description: Hospice spending year-to-date
  data_type: decimal
- name: Outpatient Spend YTD
  output_name: outpatient_spend_ytd
  description: Outpatient spending year-to-date
  data_type: decimal
- name: SNF Cost YTD
  output_name: snf_cost_ytd
  description: Skilled Nursing Facility costs year-to-date
  data_type: decimal
- name: Inpatient Spend YTD
  output_name: inpatient_spend_ytd
  description: Inpatient spending year-to-date
  data_type: decimal
- name: Home Health Spend YTD
  output_name: home_health_spend_ytd
  description: Home Health spending year-to-date
  data_type: decimal
- name: Total Spend YTD
  output_name: total_spend_ytd
  description: Total spending year-to-date
  data_type: decimal
- name: Wound Spend YTD
  output_name: wound_spend_ytd
  description: Wound care spending year-to-date
  data_type: decimal
- name: APCM spend YTD
  output_name: apcm_spend_ytd
  description: Advanced Primary Care Management spending year-to-date
  data_type: decimal
- name: E&M Cost YTD
  output_name: em_cost_ytd
  description: Evaluation and Management costs year-to-date
  data_type: decimal
- name: Any Inpatient Hospital Admits YTD
  output_name: any_inpatient_hospital_admits_ytd
  description: Count of inpatient hospital admissions year-to-date
  data_type: integer
- name: Any Inpatient Hospital Admits 90 day prior
  output_name: any_inpatient_hospital_admits_90_day_prior
  description: Count of inpatient hospital admissions in prior 90 days
  data_type: integer
- name: ER Admits YTD
  output_name: er_admits_ytd
  description: Emergency Room admissions year-to-date
  data_type: integer
- name: ER Admits 90 day prior
  output_name: er_admits_90_day_prior
  description: Emergency Room admissions in prior 90 days
  data_type: integer
- name: E&M Visits YTD
  output_name: em_visits_ytd
  description: Evaluation and Management visits year-to-date
  data_type: integer
- name: Hospice Admission (T/F)
  output_name: hospice_admission
  description: Hospice admission flag (True/False)
  data_type: boolean
- name: SNF
  output_name: snf
  description: Skilled Nursing Facility indicator
  data_type: string
- name: IRF
  output_name: irf
  description: Inpatient Rehabilitation Facility indicator
  data_type: string
- name: LTAC
  output_name: ltac
  description: Long-Term Acute Care indicator
  data_type: string
- name: Home Health
  output_name: home_health
  description: Home Health services indicator
  data_type: string
- name: Most Recent AWV Date
  output_name: most_recent_awv_date
  description: Most recent Annual Wellness Visit date
  data_type: date
  date_format:
  - '%Y-%m-%d'
  - '%m/%d/%Y'
  - '%-m/%-d/%Y'
- name: Claim ID of AWV
  output_name: awv_claim_id
  description: Unique claim id for the most recent AWV
  data_type: string
- name: Last Date of E+M Visit
  output_name: last_em_visit
  description: Most recent E+M visit
  data_type: date
  date_format:
  - '%Y-%m-%d'
  - '%m/%d/%Y'
  - '%-m/%-d/%Y'
- name: A2671 EM Provider NPI
  output_name: aco_em_npi
  description: npi for most recent E+M
  data_type: string
- name: EM Provider Name
  output_name: aco_em_name
  description: HDAI generated name of individual provider
  data_type: string
- name: E&M Flag with HC Provider
  output_name: flag_em_hcmg
  description: boolean to tell whether the EMs come from an NPI/TIN combo associated with HCMG 
  data_type: string

medallion_layer: silver

unity_catalog: main
