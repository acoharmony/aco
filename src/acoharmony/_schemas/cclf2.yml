version: 2
name: cclf2
description: CCLF2 Part A Claims Revenue Center Detail File - Fixed-width file containing Part A revenue center line item
  details
storage:
  tier: bronze
  file_patterns:
    mssp: P.A*.ACO.ZC2Y*.D*.T*
    reach: P.D*.ACO.ZC2Y*.D*.T*
    mssp_regular: P.A*.ACO.ZC2Y*.D*.T*
    mssp_runout: P.A*.ACO.ZC2R*.D*.T*
    reach_monthly: P.D*.ACO.ZC2Y*.D*.T*
    reach_runout: P.D*.ACO.ZC2R*.D*.T*
    mssp_weekly: P.A*.ACO.ZC2WY*.D*.T*
  silver:
    output_name: cclf2.parquet
    refresh_frequency: weekly
    last_updated_by: scripts/process_raw_to_parquet.py
  gold:
    output_name: null
    refresh_frequency: null
    last_updated_by: null
file_format:
  type: fixed_width
  encoding: utf-8
  record_length: 199
columns:
- name: cur_clm_uniq_id
  description: Current Claim Unique Identifier - A unique identification number assigned to the claim
  data_type: string
  start_pos: 1
  end_pos: 13
  length: 13
  required: true
- name: clm_line_num
  description: Claim Line Number - A sequential number that identifies a specific claim line
  data_type: string
  start_pos: 14
  end_pos: 23
  length: 10
  required: true
- name: bene_mbi_id
  description: Medicare Beneficiary Identifier - A Medicare Beneficiary Identifier assigned to a beneficiary
  data_type: string
  start_pos: 24
  end_pos: 34
  length: 11
  required: true
- name: bene_hic_num
  description: Beneficiary HIC Number - Legacy field, blank as of January 1, 2020
  data_type: string
  start_pos: 35
  end_pos: 45
  length: 11
- name: clm_type_cd
  description: Claim Type Code - Type of claim (10=HHA, 20=SNF, 30=Swing bed SNF, 40=Outpatient, 50=Hospice, 60=Inpatient,
    61=Inpatient Full-Encounter)
  data_type: string
  start_pos: 46
  end_pos: 47
  length: 2
- name: clm_line_from_dt
  description: Claim Line From Date - The date the service associated with the line item began
  data_type: date
  start_pos: 48
  end_pos: 57
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_line_thru_dt
  description: Claim Line Thru Date - The date the service associated with the line item ended
  data_type: date
  start_pos: 58
  end_pos: 67
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_line_prod_rev_ctr_cd
  description: Product Revenue Center Code - Cost center code for billing (0001 = total of all revenue centers)
  data_type: string
  start_pos: 68
  end_pos: 71
  length: 4
- name: clm_line_instnl_rev_ctr_dt
  description: Claim Line Institutional Revenue Center Date - Date that applies to the Revenue Center code service
  data_type: date
  start_pos: 72
  end_pos: 81
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_line_hcpcs_cd
  description: HCPCS Code - Procedure/supply/product/service code (HIPPS code when Revenue Center is 0022)
  data_type: string
  start_pos: 82
  end_pos: 86
  length: 5
- name: bene_eqtbl_bic_hicn_num
  description: Beneficiary Equitable BIC HICN Number - Legacy field, blank as of January 1, 2020
  data_type: string
  start_pos: 87
  end_pos: 97
  length: 11
- name: prvdr_oscar_num
  description: Provider OSCAR Number - Medicare/Medicaid Provider Number or CCN from PECOS
  data_type: string
  start_pos: 98
  end_pos: 103
  length: 6
- name: clm_from_dt
  description: Claim From Date - First day on billing statement (Statement Covers From Date)
  data_type: date
  start_pos: 104
  end_pos: 113
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_thru_dt
  description: Claim Thru Date - Last day on billing statement (Statement Covers Through Date)
  data_type: date
  start_pos: 114
  end_pos: 123
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_line_srvc_unit_qty
  description: Claim Line Service Unit Quantity - Count of units for services needing unit reporting
  data_type: decimal
  start_pos: 124
  end_pos: 147
  length: 24
  precision: 4
- name: clm_line_cvrd_pd_amt
  description: Claim Line Covered Paid Amount - Amount Medicare reimbursed for covered services
  data_type: decimal
  start_pos: 148
  end_pos: 164
  length: 17
  precision: 2
- name: hcpcs_1_mdfr_cd
  description: HCPCS First Modifier Code - First modifier for HCPCS procedure code
  data_type: string
  start_pos: 165
  end_pos: 166
  length: 2
- name: hcpcs_2_mdfr_cd
  description: HCPCS Second Modifier Code - Second modifier for HCPCS procedure code
  data_type: string
  start_pos: 167
  end_pos: 168
  length: 2
- name: hcpcs_3_mdfr_cd
  description: HCPCS Third Modifier Code - Third modifier for HCPCS procedure code
  data_type: string
  start_pos: 169
  end_pos: 170
  length: 2
- name: hcpcs_4_mdfr_cd
  description: HCPCS Fourth Modifier Code - Fourth modifier for HCPCS procedure code
  data_type: string
  start_pos: 171
  end_pos: 172
  length: 2
- name: hcpcs_5_mdfr_cd
  description: HCPCS Fifth Modifier Code - Fifth modifier for HCPCS procedure code
  data_type: string
  start_pos: 173
  end_pos: 174
  length: 2
- name: clm_rev_apc_hipps_cd
  description: Claim Revenue APC HIPPS Code - APC group for outpatient claim type
  data_type: string
  start_pos: 175
  end_pos: 179
  length: 5
- name: clm_fac_prvdr_oscar_num
  description: Claim Facility Provider OSCAR Number - Facility Medicare/Medicaid ID from claims processing system (as of Jan
    2022)
  data_type: string
  start_pos: 180
  end_pos: 199
  length: 20
medallion_layer: bronze
unity_catalog: main
fourIcli:
  category: Claim and Claim Line Feed (CCLF) Files
  fileTypeCode: 113
  filePattern: P.?????.ACO.ZC*??.D??????.T*.zip, P.?????.ACO.ZCWY??.S??????.E??????.D??????.T*.zip, P.?????.ACO.ZC*Y??.D??????.T*,
    P.?????.ACO.ZC*WY??.D??????.T*, P.?????.ACO.ZC*R??.D??????.T*
  extractZip: true
  refreshFrequency: weekly
  defaultDateFilter:
    createdWithinLastWeek: true
