version: 2
name: enrollment
description: Custom enrollment input combining beneficiary demographics with assignment periods
staging: beneficiary_demographics
storage:
  tier: silver
  gold:
    output_name: enrollment.parquet

# Tuva Health integration
tuva:
  models:
    intermediate:
      - int_enrollment
    final:
      - eligibility
  inject:
    - int_enrollment  # Polars-native override (window functions not supported in Polars SQL)

deduplication:
  key:
  - bene_mbi_id
  sort_by:
  - bene_part_a_enrlmt_bgn_dt
  - bene_part_b_enrlmt_bgn_dt
  keep: last
standardization:
  rename_columns:
    bene_part_b_enrlmt_bgn_dt: enrollment_start_date
    source_file: file_name
  add_columns:
  - name: person_id
    value: current_bene_mbi_id
  - name: payer
    value: Medicare
  - name: payer_type
    value: Medicare
  - name: plan
    value: ACO
  add_computed:
    bene_member_month: format_year_month_from_enrollment_start
    enrollment_end_date: enrollment_end_date_with_death_truncation
columns:
- name: member_id
  description: Medicare Beneficiary Identifier
  data_type: string
  required: true
- name: person_id
  description: Person identifier (same as member_id)
  data_type: string
  required: true
- name: enrollment_start_date
  description: Start date of enrollment period
  data_type: date
  required: true
- name: enrollment_end_date
  description: End date of enrollment period
  data_type: date
  required: true
- name: payer
  description: Payer name
  data_type: string
  required: true
  default: Medicare
- name: payer_type
  description: Type of payer
  data_type: string
  default: Medicare
- name: plan
  description: Insurance plan
  data_type: string
  default: ACO
- name: gender
  description: Member gender
  data_type: string
- name: birth_date
  description: Member birth date
  data_type: date
- name: death_date
  description: Member death date (if applicable)
  data_type: date
- name: race
  description: Member race
  data_type: string
- name: ethnicity
  description: Member ethnicity
  data_type: string
- name: state
  description: State code
  data_type: string
- name: zip_code
  description: ZIP code
  data_type: string
- name: county
  description: County code
  data_type: string
- name: dual_status_code
  description: Medicare/Medicaid dual eligibility status
  data_type: string
- name: medicare_status_code
  description: Medicare enrollment status
  data_type: string
- name: original_reason_entitlement_code
  description: Original reason for Medicare entitlement
  data_type: string
- name: program_type
  description: ACO program type (MSSP, REACH, etc.)
  data_type: string
- name: assignment_method
  description: How member was assigned (claims-based, voluntary, etc.)
  data_type: string
- name: data_source
  description: Source of the data
  data_type: string
  default: CCLF
- name: processed_date
  description: Date record was processed
  data_type: timestamp
xref:
  description: Apply MBI crosswalk to get current MBI
  table: beneficiary_xref
  join_key: bene_mbi_id
  xref_key: prvs_num
  current_column: crnt_num
  output_column: current_bene_mbi_id
medallion_layer: silver
unity_catalog: main
