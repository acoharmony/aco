version: 2
name: pbvar
description: Provider Beneficiary Voluntary Alignment Report
storage:
  tier: bronze
  file_patterns:
    reach:
    - '*PBVAR*.xlsx'
  silver:
    output_name: pbvar.parquet
    refresh_frequency: quarterly
    last_updated_by: aco transform pbvar 
file_format:
  type: excel
  sheet_name: 0
  encoding: utf-8
columns:
- name: ACO_ID
  output_name: aco_id
  description: ACO Identifier
  data_type: string
  required: true
- name: RESPONSE_CODE_LIST
  output_name: sva_response_code_list
  description: Response code list
  data_type: string
- name: ID_RECEIVED
  output_name: id_received
  description: ID received
  data_type: string
- name: BENE_MBI
  output_name: bene_mbi
  description: Medicare Beneficiary Identifier
  data_type: string
  required: true
- name: BENE_FIRST_NAME
  output_name: bene_first_name
  description: Beneficiary First Name
  data_type: string
- name: BENE_LAST_NAME
  output_name: bene_last_name
  description: Beneficiary Last Name
  data_type: string
- name: BENE_LINE_1_ADDRESS
  output_name: bene_line_1_address
  description: Beneficiary Address Line 1
  data_type: string
- name: BENE_LINE_2_ADDRESS
  output_name: bene_line_2_address
  description: Beneficiary Address Line 2
  data_type: string
- name: BENE_CITY
  output_name: bene_city
  description: Beneficiary City
  data_type: string
- name: BENE_STATE
  output_name: bene_state
  description: Beneficiary State
  data_type: string
- name: BENE_ZIPCODE
  output_name: bene_zipcode
  description: Beneficiary ZIP Code
  data_type: string
- name: PROVIDER_NAME
  output_name: provider_name
  description: Provider Organization Name
  data_type: string
- name: PRACTITIONER_NAME
  output_name: practitioner_name
  description: Practitioner Name
  data_type: string
- name: IND_NPI
  output_name: sva_npi
  description: Individual Provider NPI
  data_type: string
  required: true
- name: IND_TIN
  output_name: sva_tin
  description: Individual Provider TIN
  data_type: string
- name: SIGNATURE_DATE
  output_name: sva_signature_date
  description: Signature Date
  data_type: date
  date_format:
  - '%m/%d/%Y'
  - '%-m/%-d/%Y'
  - '%Y-%m-%d'
medallion_layer: bronze
unity_catalog: main
fourIcli:
  category: Beneficiary List
  fileTypeCode: 175
  filePattern: P.D????.PBVAR.D??????.T0112000.xlsx
  extractZip: false
  refreshFrequency: quarterly
  defaultDateFilter:
    createdWithinLastQuarter: true
