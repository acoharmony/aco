version: 2
name: pfs_rates
description: Medicare Physician Fee Schedule payment rates by HCPCS code and office location with year-over-year comparison
storage:
  tier: gold
  gold:
    output_name: pfs_rates.parquet
    refresh_frequency: annual
    last_updated_by: aco pipeline pfs_rates
  file_patterns:
    default: 'pfs_rates_*.parquet'
file_format:
  type: parquet
  compression: snappy
columns:
- name: hcpcs_code
  description: HCPCS/CPT procedure code
  data_type: string
  required: true
- name: hcpcs_description
  description: HCPCS code description from PPRVU file
  data_type: string
- name: office_name
  description: Office location name from office_zip mapping
  data_type: string
  required: true
- name: office_zip
  description: Office ZIP code (5-digit)
  data_type: string
  required: true
- name: state
  description: Two-letter state code
  data_type: string
  required: true
- name: carrier
  description: Medicare carrier number
  data_type: string
- name: locality
  description: Medicare locality code
  data_type: string
  required: true
- name: geo_locality_name
  description: Geographic locality name from GPCI file
  data_type: string
- name: year
  description: Payment year (e.g., 2026)
  data_type: int
  required: true
- name: work_rvu
  description: Work Relative Value Unit
  data_type: float
  required: true
- name: nf_pe_rvu
  description: Non-Facility Practice Expense RVU
  data_type: float
  required: true
- name: f_pe_rvu
  description: Facility Practice Expense RVU (for future use)
  data_type: float
- name: mp_rvu
  description: Malpractice RVU
  data_type: float
  required: true
- name: pw_gpci
  description: Physician Work Geographic Practice Cost Index
  data_type: float
  required: true
- name: pe_gpci
  description: Practice Expense Geographic Practice Cost Index
  data_type: float
  required: true
- name: mp_gpci
  description: Malpractice Geographic Practice Cost Index
  data_type: float
  required: true
- name: conversion_factor
  description: Medicare conversion factor for the year
  data_type: float
  required: true
- name: work_payment
  description: Work payment component (work_rvu × pw_gpci)
  data_type: float
  required: true
- name: pe_payment
  description: Practice expense payment component (nf_pe_rvu × pe_gpci)
  data_type: float
  required: true
- name: mp_payment
  description: Malpractice payment component (mp_rvu × mp_gpci)
  data_type: float
  required: true
- name: total_rvu_adjusted
  description: Sum of geographically adjusted RVUs
  data_type: float
  required: true
- name: payment_rate
  description: Final payment amount (total_rvu_adjusted × conversion_factor)
  data_type: float
  required: true
- name: prior_year
  description: Previous year for comparison
  data_type: int
- name: prior_work_rvu
  description: Prior year work RVU
  data_type: float
- name: prior_nf_pe_rvu
  description: Prior year non-facility PE RVU
  data_type: float
- name: prior_mp_rvu
  description: Prior year malpractice RVU
  data_type: float
- name: prior_conversion_factor
  description: Prior year conversion factor
  data_type: float
- name: prior_payment_rate
  description: Prior year final payment amount
  data_type: float
- name: rate_change_dollars
  description: Dollar change from prior year (current - prior)
  data_type: float
- name: rate_change_percent
  description: Percent change from prior year ((current - prior) / prior × 100)
  data_type: float
- name: facility_type
  description: Facility setting (non_facility, facility, both)
  data_type: string
  required: true
- name: calculation_date
  description: Timestamp when rates were calculated
  data_type: datetime
  required: true
- name: market
  description: Market name from office_zip
  data_type: string
- name: region_name
  description: Region name from office_zip
  data_type: string

medallion_layer: gold
unity_catalog: main

metadata:
  purpose: |
    Calculates Medicare Physician Fee Schedule (PFS) payment rates for HCPCS codes
    across all office locations using geographic adjustments (GPCI) and conversion factors.

    Payment Formula:
    payment_rate = ((work_rvu × pw_gpci) + (nf_pe_rvu × pe_gpci) + (mp_rvu × mp_gpci)) × conversion_factor

    Provides year-over-year comparison to track payment rate changes.

  usage: |
    Used to:
    1. Calculate expected Medicare payments for specific procedures at each office
    2. Compare payment rates across geographic localities
    3. Track year-over-year payment changes
    4. Support financial planning and budgeting
    5. Analyze geographic payment variations

  data_sources: |
    - office_zip.parquet: Office locations and ZIP codes
    - cms_geo_zips.parquet: ZIP to Medicare locality mapping
    - gpci_inputs.parquet: Geographic Practice Cost Indices
    - pprvu_inputs.parquet: Relative Value Units and conversion factors

  update_frequency: |
    Annual refresh when new PFS data is published (typically December for following year).
    May require mid-year updates if CMS publishes corrections or updates.

  validation_rules: |
    - All RVUs must be >= 0
    - All GPCIs must be > 0 (typically 0.7 to 1.5)
    - Conversion factor should be reasonable ($30-$50 for recent years)
    - payment_rate should equal calculated formula result
    - If prior_year exists, rate_change_* fields must be populated
