version: 1
name: participant_list
description: ACO REACH Participant List - Provider roster with entity and BEI information
storage:
  tier: bronze
  file_patterns:
    reach:
    - 'ACO REACH Participant List PY[0-9][0-9][0-9][0-9]*.xlsx'
    - 'ACO REACH Provider List PY[0-9][0-9][0-9][0-9]*.xlsx'
    harmonycares:
    - 'D0259 Provider List - *.xlsx'
  silver:
    output_name: participant_list.parquet
    refresh_frequency: monthly
    last_updated_by: aco transform participant_list
file_format:
  type: participant_list_excel
  encoding: utf-8
  has_header: true
columns:
- name: Entity ID
  output_name: entity_id
  description: ACO Entity Identifier
  data_type: string
- name: Entity TIN
  output_name: entity_tin
  description: Tax Identification Number for Entity
  data_type: string
- name: Entity Legal Business Name
  output_name: entity_legal_business_name
  description: Legal Business Name of Entity
  data_type: string
- name: Performance Year
  output_name: performance_year
  description: Performance Year (e.g., PY2025)
  data_type: string
- name: Provider Type
  output_name: provider_type
  description: Type of provider (e.g., Individual Practitioner)
  data_type: string
- name: Provider Class
  output_name: provider_class
  description: Provider classification
  data_type: string
- name: Provider Legal Business Name
  output_name: provider_legal_business_name
  description: Legal Business Name of Provider
  data_type: string
- name: Individual NPI
  output_name: individual_npi
  description: Individual Provider NPI Number
  data_type: string
- name: Individual First Name
  output_name: individual_first_name
  description: Provider First Name
  data_type: string
- name: Individual Last Name
  output_name: individual_last_name
  description: Provider Last Name
  data_type: string
- name: Base Provider TIN
  output_name: base_provider_tin
  description: Base Provider Tax Identification Number
  data_type: string
- name: Organization NPI
  output_name: organization_npi
  description: Organization NPI Number
  data_type: string
- name: CCN
  output_name: ccn
  description: CMS Certification Number
  data_type: string
- name: Sole Proprietor
  output_name: sole_proprietor
  description: Sole Proprietor Indicator
  data_type: string
- name: Sole Proprietor TIN
  output_name: sole_proprietor_tin
  description: Sole Proprietor TIN
  data_type: string
- name: Primary Care Services
  output_name: primary_care_services
  description: Primary Care Services Indicator
  data_type: string
- name: Specialty
  output_name: specialty
  description: Provider Specialty
  data_type: string
- name: Base Provider TIN Status
  output_name: base_provider_tin_status
  description: Status of Base Provider TIN
  data_type: string
- name: Base Provider TIN Dropped/Terminated Reason
  output_name: base_provider_tin_dropped_terminated_reason
  description: Reason for TIN Drop/Termination
  data_type: string
- name: Effective Start Date
  output_name: effective_start_date
  description: Effective Start Date
  data_type: string
- name: Effective End Date
  output_name: effective_end_date
  description: Effective End Date
  data_type: string
- name: Last Updated Date
  output_name: last_updated_date
  description: Last Updated Date
  data_type: string
- name: Ad-hoc Provider Addition Reason
  output_name: ad_hoc_provider_addition_reason
  description: Reason for Ad-hoc Provider Addition
  data_type: string
- name: PECOS Check Results
  output_name: pecos_check_results
  description: PECOS Check Results
  data_type: string
- name: Uses CEHRT?
  output_name: uses_cehrt
  description: Uses CEHRT Indicator
  data_type: string
- name: I attest that this provider will use CEHRT in a manner sufficient to meet the applicable requirements of the Advanced Alternative Payment Model criterion under 42 CFR § 414.1415(a)(1)(iii), including any amendments thereto
  output_name: cehrt_attestation
  description: CEHRT Attestation
  data_type: string
- name: CEHRT ID
  output_name: cehrt_id
  description: CEHRT Identifier
  data_type: string
- name: I attest that this provider has an exception for Low-volume threshold, as defined in 42 CFR 414.1305
  output_name: low_volume_exception
  description: Low Volume Exception Attestation
  data_type: string
- name: I attest that this provider has an exception for not being an MIPS eligible clinician, as set forth in § 414.1310(b)(2)
  output_name: mips_exception
  description: MIPS Exception Attestation
  data_type: string
- name: I attest that this provider has an exception for Reweighting of the MIPS Promoting Interoperability, as set forth at 42 CFR 414.1380(c)(2)(i)
  output_name: mips_reweighting_exception
  description: MIPS Reweighting Exception Attestation
  data_type: string
- name: Other
  output_name: other
  description: Other Information
  data_type: string
- name: Overlaps/Deficiencies
  output_name: overlaps_deficiencies
  description: Overlaps or Deficiencies
  data_type: string
- name: Attestation (Y/N)
  output_name: attestation_y_n
  description: Attestation Yes/No
  data_type: string
- name: Total Care Capitation % Reduction
  output_name: total_care_capitation_pct_reduction
  description: Total Care Capitation % Reduction
  data_type: string
- name: Primary Care Capitation % Reduction
  output_name: primary_care_capitation_pct_reduction
  description: Primary Care Capitation % Reduction
  data_type: string
- name: Advanced Payment % Reduction
  output_name: advanced_payment_pct_reduction
  description: Advanced Payment % Reduction
  data_type: string
- name: Cardiac and Pulmonary Rehabilitation
  output_name: cardiac_pulmonary_rehabilitation
  description: Cardiac and Pulmonary Rehabilitation BEI
  data_type: string
- name: Care Management Home Visit
  output_name: care_management_home_visit
  description: Care Management Home Visit BEI
  data_type: string
- name: Concurrent Care for Hospice Beneficiaries
  output_name: concurrent_care_for_hospice
  description: Concurrent Care for Hospice Beneficiaries BEI
  data_type: string
- name: Chronic Disease Management Reward (BEI)
  output_name: chronic_disease_management_reward
  description: Chronic Disease Management Reward (BEI)
  data_type: string
- name: Cost Sharing for Part B Services (BEI)
  output_name: cost_sharing_for_part_b
  description: Cost Sharing for Part B Services (BEI)
  data_type: string
- name: Diabetic Shoes
  output_name: diabetic_shoes
  description: Diabetic Shoes BEI
  data_type: string
- name: Home Health Homebound Waiver
  output_name: home_health_homebound_waiver
  description: Home Health Homebound Waiver BEI
  data_type: string
- name: Home Infusion Therapy
  output_name: home_infusion_therapy
  description: Home Infusion Therapy BEI
  data_type: string
- name: Hospice Care Certification
  output_name: hospice_care_certification
  description: Hospice Care Certification BEI
  data_type: string
- name: Medical Nutrition Therapy
  output_name: medical_nutrition_therapy
  description: Medical Nutrition Therapy BEI
  data_type: string
- name: Nurse Practitioner Services
  output_name: nurse_practitioner_services
  description: Nurse Practitioner Services BEI
  data_type: string
- name: Post Discharge Home Visit
  output_name: post_discharge_home_visit
  description: Post Discharge Home Visit BEI
  data_type: string
- name: Skilled Nursing Facility (SNF) 3-Day Stay Waiver
  output_name: snf_3_day_stay_waiver
  description: Skilled Nursing Facility (SNF) 3-Day Stay Waiver BEI
  data_type: string
- name: Telehealth
  output_name: telehealth
  description: Telehealth BEI
  data_type: string
- name: Email
  output_name: email
  description: Provider Email Address
  data_type: string
