version: 2
name: cclf3
description: CCLF3 Part A Procedure Code File - Fixed-width file containing Part A
  procedure codes performed during claims period
storage:
  tier: bronze
  file_patterns:
    mssp: P.A*.ACO.ZC3Y*.D*.T*
    reach: P.D*.ACO.ZC3Y*.D*.T*
    mssp_regular: P.A*.ACO.ZC3Y*.D*.T*
    mssp_runout: P.A*.ACO.ZC3R*.D*.T*
    reach_monthly: P.D*.ACO.ZC3Y*.D*.T*
    reach_runout: P.D*.ACO.ZC3R*.D*.T*
    mssp_weekly: P.A*.ACO.ZC3WY*.D*.T*
  silver:
    output_name: cclf3.parquet
    refresh_frequency: weekly
    last_updated_by: scripts/process_raw_to_parquet.py
  gold:
    output_name: null
    refresh_frequency: null
    last_updated_by: null
file_format:
  type: fixed_width
  encoding: utf-8
  record_length: 114
columns:
- name: cur_clm_uniq_id
  description: Current Claim Unique Identifier - A unique identification number assigned
    to the claim
  data_type: string
  start_pos: 1
  end_pos: 13
  length: 13
  required: true
- name: bene_mbi_id
  description: Medicare Beneficiary Identifier - A Medicare Beneficiary Identifier
    assigned to a beneficiary
  data_type: string
  start_pos: 14
  end_pos: 24
  length: 11
  required: true
- name: bene_hic_num
  description: Beneficiary HIC Number - Legacy Beneficiary HICN field
  data_type: string
  start_pos: 25
  end_pos: 35
  length: 11
- name: clm_type_cd
  description: Claim Type Code - Type of claim (10=HHA, 20=Non swing bed SNF, 30=Swing
    bed SNF, 40=Outpatient, 50=Hospice, 60=Inpatient, 61=Inpatient Full-Encounter)
  data_type: string
  start_pos: 36
  end_pos: 37
  length: 2
- name: clm_val_sqnc_num
  description: Claim Value Sequence Number - An arbitrary sequential number that uniquely
    identifies a procedure code record within the claim
  data_type: string
  start_pos: 38
  end_pos: 39
  length: 2
- name: clm_prcdr_cd
  description: Procedure Code - The ICD-9/10 code that indicates the procedure performed
    during the period covered by the claim
  data_type: string
  start_pos: 40
  end_pos: 46
  length: 7
- name: clm_prcdr_prfrm_dt
  description: Procedure Performed Date - The date the indicated procedure was performed
  data_type: date
  start_pos: 47
  end_pos: 56
  length: 10
  date_format: '%Y-%m-%d'
- name: bene_eqtbl_bic_hicn_num
  description: Beneficiary Equitable BIC HICN Number - Legacy Beneficiary Equitable
    BIC HICN Number
  data_type: string
  start_pos: 57
  end_pos: 67
  length: 11
- name: prvdr_oscar_num
  description: Provider OSCAR Number - Medicare/Medicaid Provider Number or CCN from
    PECOS
  data_type: string
  start_pos: 68
  end_pos: 73
  length: 6
- name: clm_from_dt
  description: Claim From Date - First day on billing statement (Statement Covers
    From Date)
  data_type: date
  start_pos: 74
  end_pos: 83
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_thru_dt
  description: Claim Thru Date - Last day on billing statement (Statement Covers Through
    Date)
  data_type: date
  start_pos: 84
  end_pos: 93
  length: 10
  date_format: '%Y-%m-%d'
- name: dgns_prcdr_icd_ind
  description: ICD Version Indicator - 9=ICD-9, 0=ICD-10, U=any value other than 9
    or 0 in source data
  data_type: string
  start_pos: 94
  end_pos: 94
  length: 1
- name: clm_blg_prvdr_oscar_num
  description: Claim Provider OSCAR Number - Facility Medicare/Medicaid ID from claims
    processing system (as of Jan 2022)
  data_type: string
  start_pos: 95
  end_pos: 114
  length: 20
medallion_layer: bronze
unity_catalog: main
fourIcli:
  category: Claim and Claim Line Feed (CCLF) Files
  fileTypeCode: 113
  filePattern: P.?????.ACO.ZC*??.D??????.T*.zip, P.?????.ACO.ZCWY??.S??????.E??????.D??????.T*.zip, P.?????.ACO.ZC*Y??.D??????.T*, P.?????.ACO.ZC*WY??.D??????.T*, P.?????.ACO.ZC*R??.D??????.T*
  extractZip: true
  refreshFrequency: weekly
  defaultDateFilter:
    createdWithinLastWeek: true