        - name: reduced_claims_non_aco
          type: float
          description: Reduced claims from non-ACO providers
        - name: reduced_claims_participant
          type: float
          description: Reduced claims from participant providers
        - name: reduced_claims_preferred
          type: float
          description: Reduced claims from preferred providers
        - name: reduced_claims_total
          type: float
          description: Total reduced claims

    # Alternative Payment Option detailed monthly calculations
    APO_PMT_DETAILED:
      sheet_type: data
      skip_rows: 7
      description: Monthly Alternative Payment Option payment calculations
      columns:
        - name: row_number
          type: integer
