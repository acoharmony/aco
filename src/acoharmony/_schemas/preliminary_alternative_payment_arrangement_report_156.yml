version: 2
name: preliminary_alternative_payment_arrangement_report_156
description: 'Preliminary Alternative Payment Arrangement Report'
storage:
  tier: bronze
  file_patterns:
    reach:
    - '*ALPAR*'
  silver:
    output_name: preliminary_alternative_payment_arrangement_report_156.parquet
    refresh_frequency: monthly
file_format:
  type: excel_multi_sheet
  parser: excel_multi_sheet
  multi_output: true
  sheet_config:
    header_row: 0
    data_start_row: 1
    column_mapping_strategy: "position"
    end_marker_column: 0
    end_marker_value: ""
sheets:
  - sheet_index: 0
    sheet_type: report_parameters
    description: ACO parameters, report configuration, and performance period details
  - sheet_index: 1
    sheet_type: payment_history
    description: Historical monthly payments for Base PCC, Enhanced PCC, and APO
  - sheet_index: 2
    sheet_type: base_pcc_detailed
    description: Monthly base PCC payment calculations with projected alignment and experience
  - sheet_index: 3
    sheet_type: enhanced_pcc_detailed
    description: Monthly enhanced PCC payment calculations with projected alignment and experience
  - sheet_index: 4
    sheet_type: base_pcc_pct
    description: Base PCC percentage calculations by claim type and provider category
  - sheet_index: 5
    sheet_type: enhanced_pcc_pct_ceil
    description: Enhanced PCC percentage ceiling calculations by claim type and provider category
  - sheet_index: 6
    sheet_type: apo_detailed
    description: Monthly Alternative Payment Option payment calculations
  - sheet_index: 7
    sheet_type: apo_pbpm
    description: APO PBPM calculations by claim type and provider category
  - sheet_index: 8
    sheet_type: data_claims_prvdr
    description: Provider-level claims data with payment adjustments and reductions
original_sheet_config:
    # Metadata sheet with ACO parameters and report configuration (key-value pairs)
    REPORT_PARAMETERS:
      sheet_type: metadata
      skip_rows: 0
      description: ACO parameters, report configuration, and performance period details

    # Historical payment data by month
    PAYMENT_HISTORY:
      sheet_type: data
      skip_rows: 5
      description: Historical monthly payments for Base PCC, Enhanced PCC, and APO
      columns:
        - name: payment_date
          type: date
          description: Payment date (first day of month)
        - name: base_pcc_total
          type: float
          description: Total base Primary Care Capitation payment
        - name: enhanced_pcc_total
          type: float
          description: Total enhanced PCC payment
        - name: apo_total
          type: float
          description: Total Alternative Payment Option payment

    # Detailed base PCC payment calculations by month
    BASE_PCC_PMT_DETAILED:
      sheet_type: data
      skip_rows: 7
      description: Monthly base PCC payment calculations with projected alignment and experience
      columns:
        - name: row_number
          type: integer
          description: Row identifier
        - name: metric
          type: string
          description: Metric description (e.g., eligible months, aligned beneficiaries)
        - name: prospective_alignment
          type: string
          description: Prospective alignment indicator
        - name: jan
          type: float
          description: January value
        - name: feb
          type: float
          description: February value
        - name: mar
          type: float
          description: March value
        - name: apr
          type: float
          description: April value
        - name: may
          type: float
          description: May value
        - name: jun
          type: float
          description: June value
        - name: jul
          type: float
          description: July value
        - name: aug
          type: float
          description: August value
        - name: sep
          type: float
          description: September value
        - name: oct
          type: float
          description: October value
        - name: nov
          type: float
          description: November value
        - name: dec
          type: float
          description: December value

    # Detailed enhanced PCC payment calculations (same structure as BASE)
    ENHANCED_PCC_PMT_DETAILED:
      sheet_type: data
      skip_rows: 7
      description: Monthly enhanced PCC payment calculations with projected alignment and experience
      columns:
        - name: row_number
          type: integer
          description: Row identifier
        - name: metric
          type: string
          description: Metric description (e.g., eligible months, aligned beneficiaries)
        - name: prospective_alignment
          type: string
          description: Prospective alignment indicator
        - name: jan
          type: float
          description: January value
        - name: feb
          type: float
          description: February value
        - name: mar
          type: float
          description: March value
        - name: apr
          type: float
          description: April value
        - name: may
          type: float
          description: May value
        - name: jun
          type: float
          description: June value
        - name: jul
          type: float
          description: July value
        - name: aug
          type: float
          description: August value
        - name: sep
          type: float
          description: September value
        - name: oct
          type: float
          description: October value
        - name: nov
          type: float
          description: November value
        - name: dec
          type: float
          description: December value

    # Base PCC percentage by claim type and provider category
    BASE_PCC_PCT:
      sheet_type: data
      skip_rows: 10
      description: Base PCC percentage calculations by claim type and provider category
      columns:
        - name: row_number
          type: integer
          description: Row identifier
        - name: claim_category
          type: string
          description: Claim category (e.g., Part A expenditure, Inpatient, SNF)
        - name: claim_type_code
          type: integer
          description: CMS claim type code
        - name: total_claims_non_aco
          type: float
          description: Total incurred claims from non-ACO providers
        - name: total_claims_participant
          type: float
          description: Total incurred claims from participant providers
        - name: total_claims_preferred
          type: float
          description: Total incurred claims from preferred providers
        - name: total_claims_all
          type: float
          description: Total incurred claims from all providers
        - name: reduced_claims_non_aco
          type: float
          description: Reduced claims from non-ACO providers
        - name: reduced_claims_participant
          type: float
          description: Reduced claims from participant providers
        - name: reduced_claims_preferred
          type: float
          description: Reduced claims from preferred providers
        - name: reduced_claims_total
          type: float
          description: Total reduced claims

    # Enhanced PCC percentage ceiling (same structure as BASE_PCC_PCT)
    ENHANCED_PCC_PCT_CEIL:
      sheet_type: data
      skip_rows: 10
      description: Enhanced PCC percentage ceiling calculations by claim type and provider category
      columns:
