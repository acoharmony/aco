version: 2
name: cms_inquiry
description: CMS template for submissions to help desk 
  that require claims data
storage:
  tier: bronze
file_format:
  type: excel
  encoding: utf-8
columns:
- name: beneficiary_mbi
  description: Medicare Beneficiary Identifier
  data_type: string
  required: true
- name: Beneficiary First Name
  output_name: bene_first_name
  description: Beneficiary First Name
  data_type: string
- name: Beneficiary Last Name
  output_name: bene_last_name
  description: Beneficiary Last Name
  data_type: string
- name: Beneficiary Zip 5
  output_name: bene_zip_5
  description: 5-digit ZIP code
  data_type: string
- name: rndrg_prvdr_npi_num
  description: Rendering Provider NPI Number - NPI of provider rendering service from PECOS
  data_type: string
- name: clm_rndrg_prvdr_tax_num
  description: Claim Provider Tax Number - SSN or EIN of provider receiving payment
  data_type: string
- name: org_npi
  description: Organizational National Provider Identifier
  data_type: string
- name: ccn
  description: CMS Certification Number
  data_type: string
- name: clm_cntl_num
  description: Claim Control Number - Unique number assigned by Medicare carrier
  data_type: string
- name: clm_src 
  description: claim source (full CCLF file name/pattern)
  data_type: string
- name: clm_type_cd
  description: Claim Type Code - Type of claim (71=RIC O local carrier non-DMEPOS, 72=RIC O local carrier DMEPOS)
  data_type: string
medallion_layer: bronze
unity_catalog: main
