version: 2
name: cclf7
description: CCLF7 Part D File - Fixed-width file containing Part D prescription drug event data
storage:
  tier: bronze
  file_patterns:
    mssp: P.A*.ACO.ZC7Y*.D*.T*
    reach: P.D*.ACO.ZC7Y*.D*.T*
    mssp_regular: P.A*.ACO.ZC7Y*.D*.T*
    mssp_runout: P.A*.ACO.ZC7R*.D*.T*
    reach_monthly: P.D*.ACO.ZC7Y*.D*.T*
    reach_runout: P.D*.ACO.ZC7R*.D*.T*
    mssp_weekly: P.A*.ACO.ZC7WY*.D*.T*
  silver:
    output_name: cclf7.parquet
    refresh_frequency: weekly
    last_updated_by: scripts/process_raw_to_parquet.py
  gold:
    output_name: null
    refresh_frequency: null
    last_updated_by: null
file_format:
  type: fixed_width
  encoding: utf-8
  record_length: 230
columns:
- name: cur_clm_uniq_id
  description: Current Claim Unique Identifier - A unique identification number assigned to the claim
  data_type: string
  start_pos: 1
  end_pos: 13
  length: 13
  required: true
- name: bene_mbi_id
  description: Medicare Beneficiary Identifier - A Medicare Beneficiary Identifier assigned to a beneficiary
  data_type: string
  start_pos: 14
  end_pos: 24
  length: 11
  required: true
- name: bene_hic_num
  description: Beneficiary HIC Number - Legacy Beneficiary HICN field
  data_type: string
  start_pos: 25
  end_pos: 35
  length: 11
- name: clm_line_ndc_cd
  description: NDC Code - A universal unique product identifier for human drugs
  data_type: string
  start_pos: 36
  end_pos: 46
  length: 11
- name: clm_type_cd
  description: Claim Type Code - Type of claim (01=Original, 02=Adjusted PDE, 03=Deleted, 04=Resubmitted PDE)
  data_type: string
  start_pos: 47
  end_pos: 48
  length: 2
- name: clm_line_from_dt
  description: Claim Line From Date - Date prescription was filled
  data_type: date
  start_pos: 49
  end_pos: 58
  length: 10
  date_format: '%Y-%m-%d'
- name: prvdr_srvc_id_qlfyr_cd
  description: Provider Service Identifier Qualifier Code - Type of pharmacy ID (01=NPI, 06=UPIN, 07=NCPDP, 08=State License,
    11=TIN, 99=Other)
  data_type: string
  start_pos: 59
  end_pos: 60
  length: 2
- name: clm_srvc_prvdr_gnrc_id_num
  description: Claim Service Provider Generic ID Number - Pharmacy ID number
  data_type: string
  start_pos: 61
  end_pos: 80
  length: 20
- name: clm_dspnsng_stus_cd
  description: Claim Dispensing Status Code - Prescription fulfillment status (P=Partially filled, C=Completely filled)
  data_type: string
  start_pos: 81
  end_pos: 81
  length: 1
- name: clm_daw_prod_slctn_cd
  description: Claim Dispense as Written Product Selection Code - Generic substitution instructions (0-9)
  data_type: string
  start_pos: 82
  end_pos: 82
  length: 1
- name: clm_line_srvc_unit_qty
  description: Claim Line Service Unit Quantity - Count of units dispensed
  data_type: decimal
  start_pos: 83
  end_pos: 106
  length: 24
  precision: 4
- name: clm_line_days_suply_qty
  description: Claim Line Days Supply Quantity - Number of days medication will cover
  data_type: string
  start_pos: 107
  end_pos: 115
  length: 9
- name: prvdr_prsbng_id_qlfyr_cd
  description: Provider Prescribing ID Qualifier Code - Type of prescriber ID (01=NPI, 06=UPIN, 07=NCPDP, 08=State License,
    11=TIN, 12=DEA, 99=Other)
  data_type: string
  start_pos: 116
  end_pos: 117
  length: 2
- name: blank_placeholder
  description: BLANK - Placeholder for retired field CLM_PRSBNG_PRVDR_GNRC_ID_NUM
  data_type: string
  start_pos: 118
  end_pos: 137
  length: 20
  keep: false
- name: clm_line_bene_pmt_amt
  description: Claim Line Beneficiary Payment Amount - Amount paid by beneficiary (copay, coinsurance, deductible)
  data_type: decimal
  start_pos: 138
  end_pos: 150
  length: 13
  precision: 2
- name: clm_adjsmt_type_cd
  description: Claim Adjustment Type Code - 0=Original, 1=Cancellation, 2=Adjustment
  data_type: string
  start_pos: 151
  end_pos: 152
  length: 2
- name: clm_efctv_dt
  description: Claim Effective Date - Date claim processed/added to NCH (Weekly Processing Date)
  data_type: date
  start_pos: 153
  end_pos: 162
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_idr_ld_dt
  description: Claim IDR Load Date - When claim was loaded into IDR
  data_type: date
  start_pos: 163
  end_pos: 172
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_line_rx_srvc_rfrnc_num
  description: Claim Line Prescription Service Reference Number - Identifies prescription by provider and date
  data_type: string
  start_pos: 173
  end_pos: 184
  length: 12
- name: clm_line_rx_fill_num
  description: Claim Line Prescription Fill Number - Sequential order of fills/refills
  data_type: string
  start_pos: 185
  end_pos: 193
  length: 9
- name: clm_phrmcy_srvc_type_cd
  description: Claim Pharmacy Service Type Code - Type of pharmacy (1=Community, 2=Compounding, 3=Home Infusion, 4=Institutional,
    5=LTC, 6=Mail Order, 7=MCO, 8=Specialty, 99=Other)
  data_type: string
  start_pos: 194
  end_pos: 195
  length: 2
- name: clm_prsbng_prvdr_gnrc_id_num
  description: Claim Prescribing Provider Generic ID Number - Prescriber ID number
  data_type: string
  start_pos: 196
  end_pos: 230
  length: 35
medallion_layer: bronze
unity_catalog: main
fourIcli:
  category: Claim and Claim Line Feed (CCLF) Files
  fileTypeCode: 113
  filePattern: P.?????.ACO.ZC*??.D??????.T*.zip, P.?????.ACO.ZCWY??.S??????.E??????.D??????.T*.zip, P.?????.ACO.ZC*Y??.D??????.T*,
    P.?????.ACO.ZC*WY??.D??????.T*, P.?????.ACO.ZC*R??.D??????.T*
  extractZip: true
  refreshFrequency: weekly
  defaultDateFilter:
    createdWithinLastWeek: true
