version: 2
name: palmr
description: Part A Line Monthly Report with claim line details
file_format:
  type: csv
  delimiter: ','
  encoding: utf-8
  header: true
storage:
  tier: bronze
  file_patterns:
    reach:
    - '*PALMR*.csv'
  silver:
    output_name: palmr.parquet
    refresh_frequency: quarterly
    last_updated_by: aco transform palmr
columns:
- name: ACO_ID
  output_name: aco_id
  description: ACO Identifier
  data_type: string
  required: true
- name: MBI_ID
  output_name: bene_mbi
  description: Medicare Beneficiary Identifier
  data_type: string
  required: true
- name: ALGN_TYPE_CLM
  output_name: algn_type_clm
  description: Alignment Type - Claims Based
  data_type: string
- name: ALGN_TYPE_VA
  output_name: algn_type_va
  description: Alignment Type - Voluntary Alignment
  data_type: string
- name: PRVDR_TIN (CLM OR VA)
  output_name: prvdr_tin
  description: Provider TIN (Claims or Voluntary)
  data_type: string
- name: PRVDR_NPI (CLM OR VA)
  output_name: prvdr_npi
  description: Provider NPI (Claims or Voluntary)
  data_type: string
- name: FAC_PRVDR_OSCAR_NUM
  output_name: fac_prvdr_oscar_num
  description: Facility Provider OSCAR Number
  data_type: string
- name: QEM_ALLOWED_PRIMARY_AY1
  output_name: qem_allowed_primary_ay1
  description: QEM Allowed Primary Care Alignment Year 1
  data_type: string
  required: false
  precision: 2
- name: QEM_ALLOWED_NONPRIMARY_AY1
  output_name: qem_allowed_nonprimary_ay1
  description: QEM Allowed Non-Primary Care Alignment Year 1
  data_type: string
  required: false
- name: QEM_ALLOWED_OTHER_AY1
  output_name: qem_allowed_other_ay1
  description: QEM Allowed Other Alignment Year 1
  data_type: string
  required: false
- name: QEM_ALLOWED_PRIMARY_AY2
  output_name: qem_allowed_primary_ay2
  description: QEM Allowed Primary Care Alignment Year 2
  data_type: string
  required: false
- name: QEM_ALLOWED_NONPRIMARY_AY2
  output_name: qem_allowed_nonprimary_ay2
  description: QEM Allowed Non-Primary Care Alignment Year 2
  data_type: string
  required: false
- name: QEM_ALLOWED_OTHER_AY2
  output_name: qem_allowed_other_ay2
  description: QEM Allowed Other Alignment Year 2
  data_type: string
  required: false
medallion_layer: bronze
unity_catalog: main
fourIcli:
  category: Beneficiary List
  fileTypeCode: 165
  filePattern: P.D????.PALMR.D??????.T*.csv
  extractZip: false
  refreshFrequency: quarterly
  defaultDateFilter:
    createdWithinLastQuarter: true
