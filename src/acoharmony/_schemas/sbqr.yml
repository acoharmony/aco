version: 2
name: sbqr
description: REACH Shadow Bundles Quarterly Report
storage:
  tier: bronze
  file_patterns:
    reach:
    - D????.PY????.Q?.SBQR.D??????.T*.xlsx
  silver:
    output_name: sbqr.parquet
    refresh_frequency: quarterly
file_format:
  type: excel_multi_sheet
  parser: excel_multi_sheet
  multi_output: true
  sheet_config:
    header_row: 5
    data_start_row: 7
    end_marker_column: 0
    end_marker_value: Total
    column_mapping_strategy: position
columns:
- name: sheet_type
  data_type: string
  description: Sheet type identifier
sheets:
- sheet_index: 0
  sheet_type: overview
  description: Overview metadata
- sheet_index: 1
  sheet_type: definitions
  description: Definitions metadata
- sheet_index: 2
  sheet_type: aco_graph_test_data_2024
  description: ACO graph test data for 2024
  columns:
  - name: data_point
    position: 0
    data_type: string
    description: Data point identifier
- sheet_index: 3
  sheet_type: aco_graph_test_data_2025
  description: ACO graph test data for 2025
  columns:
  - name: data_point
    position: 0
    data_type: string
    description: Data point identifier
- sheet_index: 4
  sheet_type: aco_vs_national_spending
  description: ACO vs National Spending metadata
- sheet_index: 5
  sheet_type: aco_summary
  description: ACO Summary data
  columns:
  - name: initial_sort_order
    position: 0
    data_type: integer
    description: Sort order for display
  - name: year_quarter
    position: 1
    data_type: string
    description: Year and quarter (e.g., 2024Q1, 2024-All)
  - name: clinical_episode_category
    position: 2
    data_type: string
    description: Clinical episode category
  - name: medical_surgical
    position: 3
    data_type: string
    description: Medical or Surgical classification
  - name: clinical_episode_count
    position: 4
    data_type: integer
    description: Number of clinical episodes
  - name: beneficiary_count
    position: 5
    data_type: integer
    description: Number of beneficiaries
- sheet_index: 6
  sheet_type: provider_details
  description: Provider Details data
  columns:
  - name: initial_sort_order
    position: 0
    data_type: integer
    description: Sort order for display
  - name: year_quarter
    position: 1
    data_type: string
    description: Year and quarter
  - name: ccn
    position: 2
    data_type: string
    description: CMS Certification Number
- sheet_index: 7
  sheet_type: outcomes_and_utilization
  description: Outcomes and Utilization data
  columns:
  - name: initial_sort_order
    position: 0
    data_type: integer
    description: Sort order for display
  - name: year_quarter
    position: 1
    data_type: string
    description: Year and quarter
  - name: clinical_episode_category
    position: 2
    data_type: string
    description: Clinical episode category
- sheet_index: 8
  sheet_type: patient_severity_details
  description: Patient Severity Details data
  columns:
  - name: initial_sort_order
    position: 0
    data_type: integer
    description: Sort order for display
  - name: year_quarter
    position: 1
    data_type: string
    description: Year and quarter
- sheet_index: 9
  sheet_type: spending_comparisons
  description: Spending Comparisons data
  columns:
  - name: initial_sort_order
    position: 0
    data_type: integer
    description: Sort order for display
  - name: year_quarter
    position: 1
    data_type: string
    description: Year and quarter
- sheet_index: 10
  sheet_type: trigger_code_spending_summary
  description: Trigger Code Spending Summary data
  columns:
  - name: initial_sort_order
    position: 0
    data_type: integer
    description: Sort order for display
  - name: year_quarter
    position: 1
    data_type: string
    description: Year and quarter
fourIcli:
  category: Reports
  fileTypeCode: 243
  extractZip: false
  refreshFrequency: quarterly
  filePattern: D????.PY????.Q?.SBQR.D??????.T*.xlsx
