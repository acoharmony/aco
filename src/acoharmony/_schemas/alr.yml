version: 2
name: alr
description: Assignment List Report (ALR) - CSV file with beneficiary assignment for
  MSSP ACOs
storage:
  tier: bronze
  silver:
    output_name: alr.parquet
    refresh_frequency: quarterly
    last_updated_by: aco transform alr
  file_patterns:
    annual: '*AALR*_1-2.csv'
    quarterly: '*QALR*_1-2.csv'
    report_year_extraction:
      annual: Y(\d{4})
      quarterly: (\d{4})Q(\d)
file_format:
  type: csv
  delimiter: ','
  encoding: utf-8
  header: true
columns:
- name: BENE_MBI_ID
  output_name: bene_mbi
  description: Medicare Beneficiary Identifier
  data_type: string
  required: true
- name: BENE_HIC_NUM
  output_name: bene_hic_num
  description: Beneficiary HIC Number (deprecated)
  data_type: string
  keep: false
- name: BENE_1ST_NAME
  output_name: bene_first_name
  description: Beneficiary First Name
  data_type: string
- name: BENE_LAST_NAME
  output_name: bene_last_name
  description: Beneficiary Last Name
  data_type: string
- name: BENE_SEX_CD
  output_name: bene_sex_cd
  description: Beneficiary Sex Code
  data_type: string
- name: BENE_BRTH_DT
  output_name: bene_birth_dt
  description: Beneficiary Birth Date
  data_type: date
  date_format:
  - '%m/%d/%Y'
  - '%Y-%m-%d'
  - '%m-%d-%Y'
  - '%Y%m%d'
- name: BENE_DEATH_DT
  output_name: death_date
  description: Beneficiary Death Date
  data_type: date
  date_format:
  - '%m/%d/%Y'
  - '%Y-%m-%d'
  - '%m-%d-%Y'
  - '%Y%m%d'
- name: MASTER_ID
  output_name: master_id
  description: Master Identifier
  data_type: string
- name: B_EM_LINE_CNT_T
  output_name: b_em_line_cnt_t
  description: E&M Line Count Total
  data_type: string
  required: false
keys:
  primary_key:
  - bene_mbi
  natural_key:
  - bene_mbi
  deduplication_key:
  - bene_mbi
  - master_id
  foreign_keys:
  - column: bene_mbi
    references: cclf8.bene_mbi
polars:
  lazy_evaluation: true
  drop_columns:
  - bene_hic_num
  string_trim: true
  categorical_columns:
  - bene_sex_cd
xref:
  description: Apply MBI crosswalk to get current MBI
  table: beneficiary_xref
  join_key: bene_mbi
  xref_key: prvs_num
  current_column: crnt_num
  output_column: current_bene_mbi
standardization:
  rename_columns:
    bene_mbi: member_id
    bene_first_name: first_name
    bene_last_name: last_name
    bene_birth_dt: date_of_birth
    bene_death_dt: date_of_death
    bene_sex_cd: gender_code
  add_columns:
  - name: assignment_type
    value: MSSP
  - name: processed_date
    value: current_timestamp()
  - name: source_file
    value: alr
foreign_keys:
  description: Relationships to other tables
  keys:
  - column: bene_mbi
    references: beneficiary_demographics.bene_mbi_id
    type: many-to-one
  - column: current_bene_mbi
    references: beneficiary_xref.crnt_num
    type: many-to-one
medallion_layer: bronze
unity_catalog: main
