version: 2
name: sbmdm
description: 'Shadow Bundles Monthly DME (Durable Medical Equipment)'
storage:
  tier: bronze
  file_patterns:
    reach:
    - 'D????.PY????.??.SBMDM.D??????.T*.csv'
  silver:
    output_name: sbmdm.parquet
    refresh_frequency: monthly
file_format:
  type: csv
  delimiter: ','
  has_header: true
columns:
  - name: episode_id
    data_type: string
    description: Episode identifier
  - name: curhic_uneq
    data_type: string
    description: Current HIC unique identifier
  - name: mbi_id
    data_type: string
    description: Medicare Beneficiary Identifier
  - name: claimno
    data_type: string
    description: Claim number
  - name: lineitem
    data_type: integer
    description: Line item number
  - name: from_dt
    data_type: date
    description: Service from date
  - name: thru_dt
    data_type: date
    description: Service through date
  - name: expnsdt1
    data_type: date
    description: Expense date 1
  - name: expnsdt2
    data_type: date
    description: Expense date 2
  - name: sup_npi
    data_type: string
    description: Supplier NPI
  - name: tax_num
    data_type: string
    description: Tax identification number
  - name: hcpcs_cd
    data_type: string
    description: HCPCS procedure code
  - name: pmt_amt
    data_type: decimal
    description: Payment amount
  - name: lprpdamt
    data_type: decimal
    description: Line primary payer paid amount
  - name: line_allowed
    data_type: decimal
    description: Line allowed amount
  - name: line_std_allowed
    data_type: decimal
    description: Line standardized allowed amount
  - name: std_cost_epi_total
    data_type: decimal
    description: Standardized cost episode total
  - name: dgnscd01
    data_type: string
    description: Diagnosis code 1
  - name: dgnscd02
    data_type: string
    description: Diagnosis code 2
  - name: dgnscd03
    data_type: string
    description: Diagnosis code 3
  - name: dgnscd04
    data_type: string
    description: Diagnosis code 4
  - name: dgnscd05
    data_type: string
    description: Diagnosis code 5
  - name: dgnscd06
    data_type: string
    description: Diagnosis code 6
  - name: dgnscd07
    data_type: string
    description: Diagnosis code 7
  - name: dgnscd08
    data_type: string
    description: Diagnosis code 8
  - name: dgnscd09
    data_type: string
    description: Diagnosis code 9
  - name: dgnscd10
    data_type: string
    description: Diagnosis code 10
  - name: dgnscd11
    data_type: string
    description: Diagnosis code 11
  - name: dgnscd12
    data_type: string
    description: Diagnosis code 12
  - name: linedgns
    data_type: string
    description: Line diagnosis pointer
fourIcli:
  category: Reports
  fileTypeCode: 243
  extractZip: false
  refreshFrequency: monthly
  filePattern: D????.PY????.??.SBMDM.D??????.T*.csv
