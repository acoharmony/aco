version: 2
name: beneficiary_xref
description: Beneficiary MBI crosswalk from CCLF9
staging: cclf9
storage:
  tier: silver
  gold:
    output_name: beneficiary_xref.parquet
deduplication:
  key:
  - prvs_num
  sort_by:
  - file_date
  - prvs_id_efctv_dt
  sort_descending:
  - true
  - true
  keep: first
standardization:
  rename_columns:
    xref_prvs_num: previous_member_id
    xref_crnt_num: current_member_id
    xref_efctv_bgn_dt: effective_start_date
    xref_efctv_end_dt: effective_end_date
  add_columns:
  - name: crosswalk_type
    value: MBI
  - name: processed_date
    value: current_timestamp()
  - name: source_file
    value: beneficiary_xref
medallion_layer: silver
unity_catalog: main
