version: 2
name: gpci_inputs
description: "ADDENDUM E. FINAL CY 2026 GEOGRAPHIC PRACTICE COST INDICES (GPCIs) BY STATE AND MEDICARE LOCALITY"
storage:
  tier: bronze
  silver:
    output_name: gpci_inputs.parquet
    refresh_frequency: annual
    last_updated_by: aco transform gpci_inputs
  file_patterns:
    annual: '*GPCI*.csv'
    annual_xlsx: '*GPCI*.xlsx'
file_format:
  type: csv
  delimiter: ','
  encoding: utf-8
  header: true
columns:
- name: medicare_administrative_contractor_id
  description: Medicare Administrative Contractor (MAC) ID
  data_type: string
- name: geo_locality_state_cd
  description: Geographic Locality State Code
  data_type: string
  required: true
- name: geo_locality_num
  description: Geographic Locality Number
  data_type: string
  required: true
- name: geo_locality_name
  description: Geographic Locality Name
  data_type: string
- name: pw_gpci
  description: Physician Work GPCI
  data_type: float
- name: pe_gpci
  description: Practice Expense GPCI
  data_type: float
- name: pe_mp_gpci
  description: Malpractice GPCI
  data_type: float
medallion_layer: bronze
unity_catalog: main
