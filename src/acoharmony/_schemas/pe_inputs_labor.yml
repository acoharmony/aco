version: 2
name: pe_inputs_labor
description: Practice Expense Labor Inputs - Labor cost and time inputs for practice expense calculations
storage:
  tier: bronze
  silver:
    output_name: pe_inputs_labor.parquet
    refresh_frequency: annual
    last_updated_by: aco transform pe_inputs_labor
  file_patterns:
    annual: '*PE_LABOR*.csv'
    annual_xlsx: '*PE_LABOR*.xlsx'
file_format:
  type: csv
  delimiter: ','
  encoding: utf-8
  header: true
columns:
- name: hcpcs
  description: HCPCS Code
  data_type: string
  required: true
- name: labor_code
  description: Labor Type Code
  data_type: string
  required: true
- name: description
  description: Labor Type Description
  data_type: string
- name: rate_per_minute
  description: Labor Rate Per Minute
  data_type: float
- name: nf_pre_service_time
  description: Non-Facility Pre-Service Time in Minutes
  data_type: float
- name: nf_intra_service_time
  description: Non-Facility Intra-Service Time in Minutes
  data_type: float
- name: nf_post_service_time
  description: Non-Facility Post-Service Time in Minutes
  data_type: float
- name: f_pre_service_time
  description: Facility Pre-Service Time in Minutes
  data_type: float
- name: f_intra_service_time
  description: Facility Intra-Service Time in Minutes
  data_type: float
- name: f_post_service_time
  description: Facility Post-Service Time in Minutes
  data_type: float
- name: global_period
  description: Global Period
  data_type: string
medallion_layer: bronze
unity_catalog: main
