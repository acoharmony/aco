name: mailed
description: ACO voluntary alignment campaign mailed letters tracking
version: 1.0.0
file_format:
  type: json
  encoding: utf-8
storage:
  tier: bronze
  file_patterns:
    main: aco_compliance___all_sent_letters*.json
  silver:
    output_name: mailed.parquet
    refresh_frequency: monthly
    last_updated_by: aco transform mailed
medallion_layer: bronze
unity_catalog: main
columns:
- name: aco_id
  source_name: ACO ID
  type: string
  description: ACO identifier
  required: true
- name: campaign_name
  source_name: Campaign Name
  type: string
  description: Campaign name and language (e.g., "2024 Q2 ACO Voluntary Alignment
    Campaign (EN)")
  required: true
- name: letter_id
  source_name: Letter ID
  type: string
  description: Unique letter identifier (UUID)
  required: true
  primary_key: true
- name: mbi
  source_name: MBI
  type: string
  description: Medicare Beneficiary Identifier
  required: true
  pii: true
- name: network_id
  source_name: Network ID
  type: string
  description: Network identifier (UUID)
  required: true
- name: network_name
  source_name: Network Name
  type: string
  description: Network/ACO name
  required: true
- name: patient_id
  source_name: Patient ID
  type: string
  description: Patient identifier (UUID)
  required: true
  pii: true
- name: patient_name
  source_name: Patient Name
  type: string
  description: Patient full name
  required: true
  pii: true
- name: practice_name
  source_name: Practice Name
  type: string
  description: Medical practice name
  required: true
- name: send_datetime
  source_name: Send Datetime
  type: string
  description: Letter send timestamp (formatted as "Month DD, YYYY, H:MM AM/PM")
  required: true
- name: send_date
  type: date
  description: Parsed send date
  required: true
- name: send_timestamp
  type: datetime
  description: Parsed send timestamp
  required: true
- name: status
  source_name: Status
  type: string
  description: Delivery status (Delivered, In Transit, etc.)
  required: true
  enum:
  - Delivered
  - In Transit
  - Failed
  - Pending
