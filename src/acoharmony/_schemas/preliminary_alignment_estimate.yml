version: 2
name: preliminary_alignment_estimate
description: 'Preliminary Alignment Estimate Report'
storage:
  tier: bronze
  file_patterns:
    reach:
    - '*PAER*'
  silver:
    output_name: preliminary_alignment_estimate.parquet
    refresh_frequency: monthly
file_format:
  type: excel
  parser: excel
  skip_rows: 5
  # Single-sheet Excel file containing preliminary alignment estimate summary
  # Sheet name: D0259 (ACO ID)
  # File structure:
  # - Row 1: ACO ID (key-value: "ACO ID" / D0259)
  # - Row 2: ACO Name (key-value: "ACO Name" / HarmonyCares ACO LLC)
  # - Row 3: ACO Type (key-value: "ACO Type" / High Needs)
  # - Row 4: Beneficiary Minimum (key-value: "Beneficiary Minimum" / 750)
  # - Row 5: Empty separator
  # - Row 6: Performance Year header (merged cell with "Performance Year 2024")
  # - Row 7: Total beneficiaries aligned (key-value: "Total" / count)
  # - Row 8: Claims-aligned only (key-value: "Claims-aligned only" / count)
  # - Row 9: Voluntarily-aligned only (key-value: "Voluntarily-aligned only" / count)
  # - Row 10: Both alignment types (key-value: "Claims- and voluntarily aligned" / count)
  # - Row 11: Note about cell suppression policy
  #
  # Note: This report uses a key-value layout. Data starts at row 7 after skipping 5 rows.
  # The first column contains alignment category labels, second column contains counts.
columns:
  - name: alignment_category
    type: string
    description: Alignment category (Total, Claims-aligned only, Voluntarily-aligned only, Claims- and voluntarily aligned)
  - name: beneficiary_count
    type: integer
    description: Number of beneficiaries in this alignment category (may be 'SUPPRESSED' if 10 or fewer)
fourIcli:
  category: Reports
  fileTypeCode: 221
  extractZip: false
  refreshFrequency: monthly
  filePattern: REACH.D????.PAER.PY????.D??????.T*.xlsx
