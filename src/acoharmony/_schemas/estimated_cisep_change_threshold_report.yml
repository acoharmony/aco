version: 2
name: estimated_cisep_change_threshold_report
description: 'Estimated CI/SEP Change Threshold Report'
storage:
  tier: bronze
  file_patterns:
    reach:
    - '*ECCTR*'
  silver:
    output_name: estimated_cisep_change_threshold_report.parquet
    refresh_frequency: monthly
file_format:
  type: excel_multi_sheet
  parser: excel_multi_sheet
  multi_output: true
  sheet_config:
    header_row: 8
    data_start_row: 9
    column_mapping_strategy: "position"
    end_marker_column: 0
    end_marker_value: ""
sheets:
  - sheet_index: 0
    sheet_type: cover
    description: Report cover page with ACO ID, report title, and agreement start date
  - sheet_index: 1
    sheet_type: table_of_contents
    description: Navigation for the report sections
  - sheet_index: 2
    sheet_type: glossary
    description: Abbreviations and terms used in the report
  - sheet_index: 3
    sheet_type: about_this_report
    description: Report purpose and overview
  - sheet_index: 4
    sheet_type: change_thresholds
    description: ACO's estimated CI/SEP change thresholds for claims-based measures
    header_row: 7
    data_start_row: 8
  - sheet_index: 5
    sheet_type: how_to_use_report
    description: Instructions and examples for interpreting the report
original_sheet_config:
    # Cover page - documentation only
    Cover:
      sheet_type: metadata
      skip_rows: 0
      description: Report cover page with ACO ID, report title, and agreement start date

    # Table of contents - documentation only
    'Table of Contents':
      sheet_type: metadata
      skip_rows: 0
      description: Navigation for the report sections

    # Glossary - documentation only
    Glossary:
      sheet_type: metadata
      skip_rows: 0
      description: Abbreviations and terms used in the report

    # About This Report - documentation only
    'About This Report':
      sheet_type: metadata
      skip_rows: 0
      description: Report purpose and overview

    # PRIMARY DATA SHEET - Change thresholds
    'Table 1-Change Thresholds':
      sheet_type: data
      skip_rows: 7
      description: ACO's estimated CI/SEP change thresholds for claims-based measures
      columns:
        - name: measure_code
          type: string
          description: Measure code (e.g., ACR, UAMCC, DAH)
        - name: measure_name
          type: string
          description: Full measure name with performance direction indicator
        - name: py2023_aqr_measure_score
          type: float
          description: ACO's PY 2023 AQR measure score
        - name: py2023_national_average
          type: float
          description: PY 2023 national average unadjusted score
        - name: py2023_standardized_score
          type: float
          description: ACO's PY 2023 AQR standardized measure score (score/national average)
        - name: py2024_improvement_threshold
          type: float
          description: ACO's estimated improvement threshold for PY 2024
        - name: py2024_decline_threshold
          type: float
          description: ACO's estimated decline threshold for PY 2024
        - name: py2024_q1_measure_score
          type: float
          description: ACO's PY 2024 Q1 measure score
        - name: py2024_q1_national_average
          type: float
          description: PY 2024 Q1 national average unadjusted score
        - name: py2024_q1_standardized_score
          type: float
          description: ACO's PY 2024 Q1 standardized measure score (score/national average)
        - name: interpretation
          type: string
          description: Estimated continuous improvement status (Improve, Decline, No change)

    # How To Use This Report - documentation only
    'How To Use This Report':
      sheet_type: metadata
      skip_rows: 0
      description: Instructions and examples for interpreting the report
columns: []
fourIcli:
  category: Reports
  fileTypeCode: 265
  extractZip: false
  refreshFrequency: monthly
  filePattern: D????.ECCTR.D??????.T*.xlsx
