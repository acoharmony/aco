version: 2
name: beneficiary_hedr_transparency_files
description: 'Beneficiary HEDR-Transparency Files'
storage:
  tier: bronze
  file_patterns:
    reach:
    - '*BDTF*'
  silver:
    output_name: beneficiary_hedr_transparency_files.parquet
    refresh_frequency: monthly
file_format:
  type: csv
  delimiter: ","
  has_header: true
columns:
  - name: aco_id
    data_type: string
    description: ACO identifier
  - name: model_id
    data_type: string
    description: Model identifier (e.g., ACOREACH)
  - name: mbi
    data_type: string
    description: Medicare Beneficiary Identifier
  - name: included_initial_numerator
    data_type: integer
    description: Initial numerator inclusion flag
  - name: included_initial_denominator
    data_type: integer
    description: Initial denominator inclusion flag
  - name: included_final_numerator
    data_type: integer
    description: Final numerator inclusion flag
  - name: included_final_denominator
    data_type: integer
    description: Final denominator inclusion flag
fourIcli:
  category: Reports
  fileTypeCode: 272
  extractZip: false
  refreshFrequency: monthly
  filePattern: P.D????.BDTF.A?.D??????.T*.zip
