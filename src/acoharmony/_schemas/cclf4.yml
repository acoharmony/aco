version: 2
name: cclf4
description: CCLF4 Part A Diagnosis Code File - Fixed-width file containing Part A
  diagnosis codes for claims
storage:
  tier: bronze
  file_patterns:
    mssp: P.A*.ACO.ZC4Y*.D*.T*
    reach: P.D*.ACO.ZC4Y*.D*.T*
    mssp_regular: P.A*.ACO.ZC4Y*.D*.T*
    mssp_runout: P.A*.ACO.ZC4R*.D*.T*
    reach_monthly: P.D*.ACO.ZC4Y*.D*.T*
    reach_runout: P.D*.ACO.ZC4R*.D*.T*
    mssp_weekly: P.A*.ACO.ZC4WY*.D*.T*
  silver:
    output_name: cclf4.parquet
    refresh_frequency: weekly
    last_updated_by: scripts/process_raw_to_parquet.py
  gold:
    output_name: null
    refresh_frequency: null
    last_updated_by: null
file_format:
  type: fixed_width
  encoding: utf-8
  record_length: 112
columns:
- name: cur_clm_uniq_id
  description: Current Claim Unique Identifier - A unique identification number assigned
    to the claim
  data_type: string
  start_pos: 1
  end_pos: 13
  length: 13
  required: true
- name: bene_mbi_id
  description: Medicare Beneficiary Identifier - A Medicare Beneficiary Identifier
    assigned to a beneficiary
  data_type: string
  start_pos: 14
  end_pos: 24
  length: 11
  required: true
- name: bene_hic_num
  description: Beneficiary HIC Number - Legacy Beneficiary HICN field
  data_type: string
  start_pos: 25
  end_pos: 35
  length: 11
- name: clm_type_cd
  description: Claim Type Code - Type of claim (10=HHA, 20=Non swing bed SNF, 30=Swing
    bed SNF, 40=Outpatient, 50=Hospice, 60=Inpatient, 61=Inpatient Full-Encounter)
  data_type: string
  start_pos: 36
  end_pos: 37
  length: 2
- name: clm_prod_type_cd
  description: Claim Product Type Code - Code classifying the diagnosis category (E=Accident
    diagnosis code, 1=First diagnosis E code, D=Other diagnosis code)
  data_type: string
  start_pos: 38
  end_pos: 38
  length: 1
- name: clm_val_sqnc_num
  description: Claim Value Sequence Number - An arbitrary sequential number that uniquely
    identifies a diagnosis code record within the claim
  data_type: string
  start_pos: 39
  end_pos: 40
  length: 2
- name: clm_dgns_cd
  description: Diagnosis Code - The ICD-9/10 diagnosis code identifying the beneficiary's
    illness or disability
  data_type: string
  start_pos: 41
  end_pos: 47
  length: 7
- name: bene_eqtbl_bic_hicn_num
  description: Beneficiary Equitable BIC HICN Number - Legacy Beneficiary Equitable
    BIC HICN Number
  data_type: string
  start_pos: 48
  end_pos: 58
  length: 11
- name: prvdr_oscar_num
  description: Provider OSCAR Number - Medicare/Medicaid Provider Number or CCN from
    PECOS
  data_type: string
  start_pos: 59
  end_pos: 64
  length: 6
- name: clm_from_dt
  description: Claim From Date - First day on billing statement (Statement Covers
    From Date)
  data_type: date
  start_pos: 65
  end_pos: 74
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_thru_dt
  description: Claim Thru Date - Last day on billing statement (Statement Covers Through
    Date)
  data_type: date
  start_pos: 75
  end_pos: 84
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_poa_ind
  description: Claim Present-on-Admission Indicator - Indicates whether patient had
    condition at time of admission
  data_type: string
  start_pos: 85
  end_pos: 91
  length: 7
- name: dgns_prcdr_icd_ind
  description: ICD Version Indicator - 9=ICD-9, 0=ICD-10, U=any value other than 9
    or 0 in source data
  data_type: string
  start_pos: 92
  end_pos: 92
  length: 1
- name: clm_blg_prvdr_oscar_num
  description: Claim Provider OSCAR Number - Facility Medicare/Medicaid ID from claims
    processing system
  data_type: string
  start_pos: 93
  end_pos: 112
  length: 20
  foreign_keys:
  - column: cur_clm_uniq_id
    references: cclf5.cur_clm_uniq_id
  - column: clm_line_num
    references: cclf5.clm_line_num
  - column: bene_mbi_id
    references: beneficiary_demographics.bene_mbi_id
medallion_layer: bronze
unity_catalog: main
fourIcli:
  category: Claim and Claim Line Feed (CCLF) Files
  fileTypeCode: 113
  filePattern: P.?????.ACO.ZC*??.D??????.T*.zip, P.?????.ACO.ZCWY??.S??????.E??????.D??????.T*.zip, P.?????.ACO.ZC*Y??.D??????.T*, P.?????.ACO.ZC*WY??.D??????.T*, P.?????.ACO.ZC*R??.D??????.T*
  extractZip: true
  refreshFrequency: weekly
  defaultDateFilter:
    createdWithinLastWeek: true
