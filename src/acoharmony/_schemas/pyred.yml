  category: Reports
  fileTypeCode: null
  extractZip: false
  refreshFrequency: monthly
  filePattern: P.D????.PYRED??.RP.D??????.T*.xlsx
  notes: PYRED files exist in DataHub but are not listed in official 4icli file type
    codes. Pattern matching only. Must be downloaded without file type filter.
