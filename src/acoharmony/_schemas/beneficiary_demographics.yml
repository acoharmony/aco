version: 2
name: beneficiary_demographics
description: Beneficiary demographics from CCLF8
storage:
  tier: silver
  staged_from: cclf8
  gold:
    output_name: beneficiary_demographics.parquet
xref:
  description: Apply MBI crosswalk to get current MBI
  table: enterprise_crosswalk
  join_key: bene_mbi_id
  xref_key: prvs_num
  current_column: crnt_num
  output_column: current_bene_mbi_id
deduplication:
  enabled: true
  key:
  - current_bene_mbi_id
  sort_by:
  - file_date
  keep: last
standardization:
  rename_columns:
    bene_mbi_id: member_id
    bene_fst_name: first_name
    bene_lst_name: last_name
    bene_mdl_name: middle_name
    bene_dob: date_of_birth
    bene_death_dt: date_of_death
    bene_sex_cd: gender_code
    bene_race_cd: race_code
    bene_mdcr_status_cd: medicare_status_code
    bene_dual_status_cd: dual_status_code
    bene_fips_state_cd: state_code
    bene_fips_cnty_cd: county_code
    bene_zip_cd: zip_code
medallion_layer: silver
unity_catalog: main
columns:
- name: bene_mbi_id
  type: string
  description: Medicare Beneficiary Identifier
  required: true
  primary_key: true
- name: bene_fips_state_cd
  type: string
  description: FIPS state code
  required: false
- name: bene_fips_cnty_cd
  type: string
  description: FIPS county code
  required: false
- name: bene_zip_cd
  type: string
  description: ZIP code
  required: false
- name: bene_dob
  type: date
  description: Date of birth
  required: false
- name: bene_sex_cd
  type: string
  description: Sex code
  required: false
- name: bene_race_cd
  type: string
  description: Race code
  required: false
- name: bene_age
  type: string
  description: Age
  required: false
- name: bene_mdcr_stus_cd
  type: string
  description: Medicare status code
  required: false
- name: bene_dual_stus_cd
  type: string
  description: Dual status code
  required: false
- name: bene_death_dt
  type: date
  description: Date of death
  required: false
- name: bene_rng_bgn_dt
  type: date
  description: Range begin date
  required: false
- name: bene_rng_end_dt
  type: date
  description: Range end date
  required: false
- name: bene_fst_name
  type: string
  description: First name
  required: false
- name: bene_mdl_name
  type: string
  description: Middle name
  required: false
- name: bene_lst_name
  type: string
  description: Last name
  required: false
- name: bene_orgnl_entlmt_rsn_cd
