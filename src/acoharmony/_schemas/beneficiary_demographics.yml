  description: Original entitlement reason code
  required: false
- name: bene_entlmt_buyin_ind
  type: string
  description: Entitlement buy-in indicator
  required: false
- name: bene_part_a_enrlmt_bgn_dt
  type: date
  description: Part A enrollment begin date
  required: false
- name: bene_part_b_enrlmt_bgn_dt
  type: date
  description: Part B enrollment begin date
  required: false
- name: bene_line_1_adr
  type: string
  description: Address line 1
  required: false
- name: bene_line_2_adr
  type: string
  description: Address line 2
  required: false
- name: bene_line_3_adr
