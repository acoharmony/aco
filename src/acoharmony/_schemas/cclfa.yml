version: 2
name: cclfa
description: CCLFA Part A Claims Benefit Enhancement and Demonstration Code File -
  Fixed-width file containing Part A benefit enhancement indicators and demonstration
  codes
storage:
  tier: bronze
  file_patterns:
    mssp: P.A*.ACO.ZCAY*.D*.T*
    reach: P.D*.ACO.ZCAY*.D*.T*
    mssp_regular: P.A*.ACO.ZCAY*.D*.T*
    mssp_runout: P.A*.ACO.ZCAR*.D*.T*
    reach_monthly: P.D*.ACO.ZCAY*.D*.T*
    reach_runout: P.D*.ACO.ZCAR*.D*.T*
    mssp_weekly: P.A*.ACO.ZCAWY*.D*.T*
  silver:
    output_name: cclfa.parquet
    refresh_frequency: weekly
    last_updated_by: scripts/process_raw_to_parquet.py
  gold:
    output_name: null
    refresh_frequency: null
    last_updated_by: null
file_format:
  type: fixed_width
  encoding: utf-8
  record_length: 324
columns:
- name: cur_clm_uniq_id
  description: Current Claim Unique Identifier - A unique identification number assigned
    to the claim
  data_type: string
  start_pos: 1
  end_pos: 13
  length: 13
  required: true
- name: bene_mbi_id
  description: Medicare Beneficiary Identifier - A Medicare Beneficiary Identifier
    assigned to a beneficiary
  data_type: string
  start_pos: 14
  end_pos: 24
  length: 11
  required: true
- name: bene_hic_num
  description: Beneficiary HIC Number - Legacy Beneficiary HICN field
  data_type: string
  start_pos: 25
  end_pos: 35
  length: 11
- name: clm_type_cd
  description: Claim Type Code - Type of claim (10=HHA, 20=Non swing bed SNF, 30=Swing
    bed SNF, 40=Outpatient, 50=Hospice, 60=Inpatient, 61=Inpatient Full-Encounter)
  data_type: string
  start_pos: 36
  end_pos: 37
  length: 2
- name: clm_actv_care_from_dt
  description: Claim Admission Date - Date beneficiary admitted to facility
  data_type: date
  start_pos: 38
  end_pos: 47
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_ngaco_pbpmt_sw
  description: PBP Benefit Enhancement Indicator - Y/N indicates PBP benefit enhancement
  data_type: string
  start_pos: 48
  end_pos: 48
  length: 1
- name: clm_ngaco_pdschrg_hcbs_sw
  description: Post Discharge Home Visit Benefit Enhancement Indicator - Y/N indicates
    Post Discharge Home Visit enhancement
  data_type: string
  start_pos: 49
  end_pos: 49
  length: 1
- name: clm_ngaco_snf_wvr_sw
  description: SNF 3-Day Waiver Benefit Enhancement Indicator - Y/N indicates SNF
    3-Day Waiver enhancement
  data_type: string
  start_pos: 50
  end_pos: 50
  length: 1
- name: clm_ngaco_tlhlth_sw
  description: Telehealth Benefit Enhancement Indicator - Y/N indicates Telehealth
    enhancement
  data_type: string
  start_pos: 51
  end_pos: 51
  length: 1
- name: clm_ngaco_cptatn_sw
  description: AIPBP Benefit Enhancement Indicator - Y/N indicates AIPBP enhancement
  data_type: string
  start_pos: 52
  end_pos: 52
  length: 1
- name: clm_demo_1st_num
  description: First Program Demonstration Number - Medicare Demonstration Special
    Processing Number
  data_type: string
  start_pos: 53
  end_pos: 54
  length: 2
- name: clm_demo_2nd_num
  description: Second Program Demonstration Number - Medicare Demonstration Special
    Processing Number
  data_type: string
  start_pos: 55
  end_pos: 56
  length: 2
- name: clm_demo_3rd_num
  description: Third Program Demonstration Number - Medicare Demonstration Special
    Processing Number
  data_type: string
  start_pos: 57
  end_pos: 58
  length: 2
- name: clm_demo_4th_num
  description: Fourth Program Demonstration Number - Medicare Demonstration Special
    Processing Number
  data_type: string
  start_pos: 59
  end_pos: 60
  length: 2
- name: clm_demo_5th_num
  description: Fifth Program Demonstration Number - Medicare Demonstration Special
    Processing Number
  data_type: string
  start_pos: 61
  end_pos: 62
  length: 2
- name: clm_pbp_inclsn_amt
  description: PBP/AIPBP Inclusion Amount - Amount that would have been paid without
    PBP/AIPBP reduction
  data_type: decimal
  start_pos: 63
  end_pos: 81
  length: 19
  precision: 2
- name: clm_pbp_rdctn_amt
  description: PBP/AIPBP Reduction Amount - Amount withheld from payment to provider
  data_type: decimal
  start_pos: 82
  end_pos: 100
  length: 19
  precision: 2
- name: clm_ngaco_cmg_wvr_sw
  description: Care Management Home Visits - Y/N indicates Care Management Home Visits
    enhancement
  data_type: string
  start_pos: 101
  end_pos: 101
  length: 1
- name: clm_instnl_per_diem_amt
  description: Claim Institutional Per Diem Amount - Maximum provider payment per
    day of care
  data_type: decimal
  start_pos: 102
  end_pos: 120
  length: 19
  precision: 2
- name: clm_mdcr_ip_bene_ddctbl_amt
  description: Claim Medicare Inpatient Beneficiary Deductible Amount - Deductible
    beneficiary paid for inpatient services
  data_type: decimal
  start_pos: 121
  end_pos: 135
  length: 15
  precision: 2
- name: clm_mdcr_coinsrnc_amt
  description: Claim Medicare Coinsurance Amount - Portion applied toward beneficiary
    coinsurance
  data_type: decimal
  start_pos: 136
  end_pos: 154
  length: 19
  precision: 2
- name: clm_blood_lblty_amt
  description: Claim Blood Liability Amount - Portion of blood deductible beneficiary
    is liable for
  data_type: decimal
  start_pos: 155
  end_pos: 169
  length: 15
  precision: 2
- name: clm_instnl_prfnl_amt
  description: Claim Institutional Professional Amount - Physician/professional charges
    under Part B
  data_type: decimal
  start_pos: 170
  end_pos: 184
  length: 15
  precision: 2
- name: clm_ncvrd_chrg_amt
  description: Claim Noncovered Charge Amount - Institutional long-term care charges
    not reimbursable
  data_type: decimal
  start_pos: 185
  end_pos: 203
  length: 19
  precision: 2
- name: clm_mdcr_ddctbl_amt
  description: Claim Medicare Deductible Amount - Portion applied toward beneficiary
    deductible
  data_type: decimal
  start_pos: 204
  end_pos: 222
  length: 19
  precision: 2
- name: clm_rlt_cond_cd
  description: Claim Related Condition Code - Code for PIP (62) or other conditions
    affecting processing
  data_type: string
  start_pos: 223
  end_pos: 224
  length: 2
- name: clm_oprtnl_outlr_amt
  description: Operating Outlier Amount (DSH) - Operating outlier/DSH payment amount
  data_type: decimal
  start_pos: 225
  end_pos: 243
  length: 19
  precision: 2
- name: clm_mdcr_new_tech_amt
  description: Medicare New Technology Add-on Payment - New technology add-on payment
    amount
  data_type: decimal
  start_pos: 244
  end_pos: 262
  length: 19
  precision: 2
- name: clm_islet_isoln_amt
  description: Islet Isolation Add-on Payment Amount - Islet isolation add-on payment
  data_type: decimal
  start_pos: 263
  end_pos: 281
  length: 19
  precision: 2
- name: clm_sqstrtn_rdctn_amt
  description: Part A Sequestration Reduction Amount - Payment reduction amount specified
    by CMS
  data_type: decimal
  start_pos: 282
  end_pos: 300
  length: 19
  precision: 2
- name: clm_1_rev_cntr_ansi_rsn_cd
  description: Claim Adjustment Reason Code (CARC) - FISS code for type of adjustment
  data_type: string
  start_pos: 301
  end_pos: 303
  length: 3
- name: clm_1_rev_cntr_ansi_grp_cd
  description: Claim Adjustment Segment Group Code - CAS codes categorizing payment
    adjustment
  data_type: string
  start_pos: 304
  end_pos: 305
  length: 2
- name: clm_mips_pmt_amt
  description: Capital MIPS Payment Costs - MIPS payment costs for capital
  data_type: decimal
  start_pos: 306
  end_pos: 324
  length: 19
  precision: 2
file_patterns:
  mssp_regular: P.A*.ACO.ZCAY*.D*.T*
  mssp_runout: P.A*.ACO.ZCAR*.D*.T*
  reach_monthly: P.D*.ACO.ZCAY*.D*.T*
  reach_runout: P.D*.ACO.ZCAR*.D*.T*
medallion_layer: bronze
unity_catalog: main
fourIcli:
  category: Claim and Claim Line Feed (CCLF) Files
  fileTypeCode: 113
  filePattern: P.?????.ACO.ZC*??.D??????.T*.zip, P.?????.ACO.ZCWY??.S??????.E??????.D??????.T*.zip, P.?????.ACO.ZC*Y??.D??????.T*, P.?????.ACO.ZC*WY??.D??????.T*, P.?????.ACO.ZC*R??.D??????.T*
  extractZip: true
  refreshFrequency: weekly
  defaultDateFilter:
    createdWithinLastWeek: true
