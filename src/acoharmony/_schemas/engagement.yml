version: 2
name: engagement
description: Patient engagement tracking data from EDW
storage:
  tier: silver
  silver:
    output_name: engagement.parquet
    refresh_frequency: weekly
  gold:
    output_name: null
    refresh_frequency: null
    last_updated_by: null
file_format:
  type: parquet
  encoding: utf-8
columns:
- name: MRN
  output_name: mrn
  description: Medical Record Number
  data_type: string
  required: true
- name: monthyear
  output_name: monthyear
  description: Month and year of engagement
  data_type: string
  required: true
- name: EM_TouchPoints
  output_name: em_touchpoints
  description: E&M Touch Points count
  data_type: integer
- name: engagement_type
  output_name: engagement_type
  description: Type of engagement
  data_type: string
- name: engagement_channel
  output_name: engagement_channel
  description: Channel of engagement (phone, portal, etc.)
  data_type: string
keys:
  primary_key:
  - mrn
  - monthyear
  - engagement_type
  - engagement_channel
  natural_key:
  - mrn
  - monthyear
  deduplication_key:
  - mrn
  - monthyear
  - engagement_type
  - engagement_channel
  foreign_keys:
  - column: mrn
    references: hcmpi_master.identifier
polars:
  lazy_evaluation: true
  string_trim: true
  categorical_columns:
  - engagement_type
  - engagement_channel
  aggregation_hints:
    group_by:
    - mrn
    - monthyear
    sum_columns:
    - em_touchpoints
standardization:
  add_columns:
  - name: source_file
    value: engagement
medallion_layer: silver
unity_catalog: main
