version: 2
name: cclf9
description: CCLF9 Beneficiary XREF - Fixed-width file containing historical to current
  MBI crosswalk
storage:
  tier: bronze
  file_patterns:
    mssp: P.A*.ACO.ZC9Y*.D*.T*
    reach: P.D*.ACO.ZC9Y*.D*.T*
    mssp_regular: P.A*.ACO.ZC9Y*.D*.T*
    mssp_runout: P.A*.ACO.ZC9R*.D*.T*
    reach_monthly: P.D*.ACO.ZC9Y*.D*.T*
    reach_runout: P.D*.ACO.ZC9R*.D*.T*
    mssp_weekly: P.A*.ACO.ZC9WY*.D*.T*
  silver:
    output_name: cclf9.parquet
    refresh_frequency: weekly
    last_updated_by: aco transform cclf9
  gold:
    output_name: null
    refresh_frequency: null
    last_updated_by: null
file_format:
  type: fixed_width
  encoding: utf-8
  record_length: 55
columns:
- name: hicn_mbi_xref_ind
  description: HICN/MBI XREF Indicator (M = MBI)
  data_type: string
  start_pos: 1
  end_pos: 1
  length: 1
  required: true
- name: crnt_num
  description: Current Beneficiary Identifier (Current Beneficiary MBI)
  data_type: string
  start_pos: 2
  end_pos: 12
  length: 11
  required: true
- name: prvs_num
  description: Previous Beneficiary Identifier (Previous Beneficiary MBI)
  data_type: string
  start_pos: 13
  end_pos: 23
  length: 11
  required: true
- name: prvs_id_efctv_dt
  description: Previous Identifier Effective Date - The date the previous identifier
    became active
  data_type: date
  start_pos: 24
  end_pos: 33
  length: 10
  date_format: '%Y-%m-%d'
- name: prvs_id_obslt_dt
  description: Previous Identifier Obsolete Date - The date the previous identifier
    ceased to be active
  data_type: date
  start_pos: 34
  end_pos: 43
  length: 10
  date_format: '%Y-%m-%d'
- name: bene_rrb_num
  description: Beneficiary Railroad Board Number (Legacy RRB number)
  data_type: string
  start_pos: 44
  end_pos: 55
  length: 12
  required: false
medallion_layer: bronze
unity_catalog: main
fourIcli:
  category: Claim and Claim Line Feed (CCLF) Files
  fileTypeCode: 113
  filePattern: P.?????.ACO.ZC*??.D??????.T*.zip, P.?????.ACO.ZCWY??.S??????.E??????.D??????.T*.zip, P.?????.ACO.ZC*Y??.D??????.T*, P.?????.ACO.ZC*WY??.D??????.T*, P.?????.ACO.ZC*R??.D??????.T*
  extractZip: true
  refreshFrequency: weekly
  defaultDateFilter:
    createdWithinLastWeek: true
