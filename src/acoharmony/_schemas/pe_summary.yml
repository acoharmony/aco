version: 2
name: pe_summary
description: Practice Expense Summary - Summary of practice expense components by HCPCS code
storage:
  tier: bronze
  silver:
    output_name: pe_summary.parquet
    refresh_frequency: annual
    last_updated_by: aco transform pe_summary
  file_patterns:
    annual: '*PE_SUMMARY*.csv'
    annual_xlsx: '*PE_SUMMARY*.xlsx'
file_format:
  type: csv
  delimiter: ','
  encoding: utf-8
  header: true
columns:
- name: hcpcs
  description: HCPCS Code
  data_type: string
  required: true
- name: modifier
  description: Modifier Code
  data_type: string
- name: hcpcs_modifier
  description: Combined HCPCS and Modifier
  data_type: string
- name: need_nf_pe_flag
  description: Need Non-Facility Practice Expense Flag
  data_type: string
- name: need_f_pe_flag
  description: Need Facility Practice Expense Flag
  data_type: string
- name: nf_pre
  description: Non-Facility Pre-Service
  data_type: float
- name: nf_pre_svc_cost
  description: Non-Facility Pre-Service Cost
  data_type: float
- name: nf_svc_cost
  description: Non-Facility Service Cost
  data_type: float
- name: nf_post_cost
  description: Non-Facility Post-Service Cost
  data_type: float
- name: f_pre_svc_cost
  description: Facility Pre-Service Cost
  data_type: float
- name: f_svc_cost
  description: Facility Service Cost
  data_type: float
- name: f_post_svc_cost
  description: Facility Post-Service Cost
  data_type: float
- name: nf_supply_cost
  description: Non-Facility Supply Cost
  data_type: float
- name: f_supply_cost
  description: Facility Supply Cost
  data_type: float
- name: nf_equipment_cost
  description: Non-Facility Equipment Cost
  data_type: float
- name: f_equipment_cost
  description: Facility Equipment Cost
  data_type: float
medallion_layer: bronze
unity_catalog: main
