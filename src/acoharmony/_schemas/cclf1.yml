version: 2
name: cclf1
description: CCLF1 Part A Claims Header File - Fixed-width file containing Part A institutional claims data
storage:
  tier: bronze
  file_patterns:
    mssp: P.A*.ACO.ZC1Y*.D*.T*
    reach: P.D*.ACO.ZC1Y*.D*.T*
    mssp_regular: P.A*.ACO.ZC1Y*.D*.T*
    mssp_runout: P.A*.ACO.ZC1R*.D*.T*
    reach_monthly: P.D*.ACO.ZC1Y*.D*.T*
    reach_runout: P.D*.ACO.ZC1R*.D*.T*
    mssp_weekly: P.A*.ACO.ZC1WY*.D*.T*
  silver:
    output_name: cclf1.parquet
    refresh_frequency: weekly
    last_updated_by: scripts/process_raw_to_parquet.py
  gold:
    output_name: null
    refresh_frequency: null
    last_updated_by: null
file_format:
  type: fixed_width
  encoding: utf-8
  record_length: 437
columns:
- name: cur_clm_uniq_id
  description: Current Claim Unique Identifier - A unique identification number assigned to the claim
  data_type: string
  start_pos: 1
  end_pos: 13
  length: 13
  required: true
- name: prvdr_oscar_num
  description: Provider OSCAR Number - Medicare/Medicaid identification number (CCN)
  data_type: string
  start_pos: 14
  end_pos: 19
  length: 6
- name: bene_mbi_id
  description: Medicare Beneficiary Identifier - A Medicare Beneficiary Identifier assigned to a beneficiary
  data_type: string
  start_pos: 20
  end_pos: 30
  length: 11
  required: true
- name: bene_hic_num
  description: Beneficiary HIC Number - Legacy Beneficiary HICN field (deprecated Jan 2020)
  data_type: string
  start_pos: 31
  end_pos: 41
  length: 11
- name: clm_type_cd
  description: Claim Type Code - Type of claim (10=HHA, 20=SNF, 30=Swing bed SNF, 40=Outpatient, 50=Hospice, 60=Inpatient,
    61=Inpatient Full-Encounter)
  data_type: string
  start_pos: 42
  end_pos: 43
  length: 2
- name: clm_from_dt
  description: Claim From Date - First day on billing statement
  data_type: date
  start_pos: 44
  end_pos: 53
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_thru_dt
  description: Claim Thru Date - Last day on billing statement
  data_type: date
  start_pos: 54
  end_pos: 63
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_bill_fac_type_cd
  description: Claim Bill Facility Type Code - Type of facility (1=Hospital, 2=SNF, 3=HHA, etc.)
  data_type: string
  start_pos: 64
  end_pos: 64
  length: 1
- name: clm_bill_clsfctn_cd
  description: Claim Bill Classification Code - Where service was provided
  data_type: string
  start_pos: 65
  end_pos: 65
  length: 1
- name: prncpl_dgns_cd
  description: Principal Diagnosis Code - ICD-9/10 diagnosis code
  data_type: string
  start_pos: 66
  end_pos: 72
  length: 7
- name: admtg_dgns_cd
  description: Admitting Diagnosis Code - ICD-9/10 diagnosis for admission
  data_type: string
  start_pos: 73
  end_pos: 79
  length: 7
- name: clm_mdcr_npmt_rsn_cd
  description: Claim Medicare Non-Payment Reason Code
  data_type: string
  start_pos: 80
  end_pos: 81
  length: 2
- name: clm_pmt_amt
  description: Claim Payment Amount - Amount Medicare paid
  data_type: decimal
  start_pos: 82
  end_pos: 98
  length: 17
  precision: 2
- name: clm_nch_prmry_pyr_cd
  description: Claim NCH Primary Payer Code - Primary payer if not Medicare
  data_type: string
  start_pos: 99
  end_pos: 99
  length: 1
- name: prvdr_fac_fips_st_cd
  description: Federal Information Processing Standards State Code
  data_type: string
  start_pos: 100
  end_pos: 101
  length: 2
- name: bene_ptnt_stus_cd
  description: Beneficiary Patient Status Code - Discharge status
  data_type: string
  start_pos: 102
  end_pos: 103
  length: 2
- name: dgns_drg_cd
  description: Diagnosis Related Group Code
  data_type: string
  start_pos: 104
  end_pos: 107
  length: 4
- name: clm_op_srvc_type_cd
  description: Claim Outpatient Service Type Code
  data_type: string
  start_pos: 108
  end_pos: 108
  length: 1
- name: fac_prvdr_npi_num
  description: Facility Provider NPI Number
  data_type: string
  start_pos: 109
  end_pos: 118
  length: 10
- name: oprtg_prvdr_npi_num
  description: Operating Provider NPI Number
  data_type: string
  start_pos: 119
  end_pos: 128
  length: 10
- name: atndg_prvdr_npi_num
  description: Attending Provider NPI Number
  data_type: string
  start_pos: 129
  end_pos: 138
  length: 10
- name: othr_prvdr_npi_num
  description: Other Provider NPI Number
  data_type: string
  start_pos: 139
  end_pos: 148
  length: 10
- name: clm_adjsmt_type_cd
  description: Claim Adjustment Type Code - 0=Original, 1=Cancellation, 2=Adjustment
  data_type: string
  start_pos: 149
  end_pos: 150
  length: 2
- name: clm_efctv_dt
  description: Claim Effective Date - Date claim was processed
  data_type: date
  start_pos: 151
  end_pos: 160
  length: 10
  date_format: '%Y-%m-%d'
- name: clm_idr_ld_dt
  description: Claim IDR Load Date - When claim was loaded into IDR
  data_type: date
  start_pos: 161
  end_pos: 170
  length: 10
  date_format: '%Y-%m-%d'
- name: bene_eqtbl_bic_hicn_num
  description: Beneficiary Equitable BIC HICN Number - Legacy field (blank after Jan 2020)
  data_type: string
  start_pos: 171
  end_pos: 181
  length: 11
- name: clm_admsn_type_cd
  description: Claim Admission Type Code - Type and priority of inpatient services
  data_type: string
  start_pos: 182
  end_pos: 183
  length: 2
- name: clm_admsn_src_cd
  description: Claim Admission Source Code - Source of referral for admission
  data_type: string
  start_pos: 184
  end_pos: 185
  length: 2
- name: clm_bill_freq_cd
  description: Claim Bill Frequency Code - Sequence of claim in episode
  data_type: string
  start_pos: 186
  end_pos: 186
  length: 1
- name: clm_query_cd
  description: Claim Query Code - Type of claim record being processed
  data_type: string
  start_pos: 187
  end_pos: 187
  length: 1
- name: dgns_prcdr_icd_ind
  description: ICD Version Indicator - 9=ICD-9, 0=ICD-10
  data_type: string
  start_pos: 188
  end_pos: 188
  length: 1
- name: clm_mdcr_instnl_tot_chrg_amt
  description: Total Claim Charge Amount
  data_type: decimal
  start_pos: 189
  end_pos: 203
  length: 15
  precision: 2
- name: clm_mdcr_ip_pps_cptl_ime_amt
  description: Claim Capital Indirect Medical Education Amount
  data_type: decimal
  start_pos: 204
  end_pos: 218
  length: 15
  precision: 2
- name: clm_oprtnl_ime_amt
  description: Claim Operational Indirect Medical Education Amount
  data_type: decimal
  start_pos: 219
  end_pos: 240
  length: 22
  precision: 2
- name: clm_mdcr_ip_pps_dsprprtnt_amt
  description: Claim Capital Disproportionate Amount
  data_type: decimal
  start_pos: 241
  end_pos: 255
  length: 15
  precision: 2
- name: clm_hipps_uncompd_care_amt
  description: Claim HIPPS Uncompensated Care Amount
  data_type: decimal
  start_pos: 256
  end_pos: 270
  length: 15
  precision: 2
- name: clm_oprtnl_dsprprtnt_amt
  description: Claim Operational Disproportionate Amount
  data_type: decimal
  start_pos: 271
  end_pos: 292
  length: 22
  precision: 2
- name: clm_blg_prvdr_oscar_num
  description: Claim Provider OSCAR Number - From claims processing system
  data_type: string
  start_pos: 293
  end_pos: 312
  length: 20
- name: clm_blg_prvdr_npi_num
  description: Claim Facility Provider NPI Number - From claims processing system
  data_type: string
  start_pos: 313
  end_pos: 322
  length: 10
- name: clm_oprtg_prvdr_npi_num
  description: Claim Operating Provider NPI Number - From claims processing system
  data_type: string
  start_pos: 323
  end_pos: 332
  length: 10
- name: clm_atndg_prvdr_npi_num
  description: Claim Attending Provider NPI Number - From claims processing system
  data_type: string
  start_pos: 333
  end_pos: 342
  length: 10
- name: clm_othr_prvdr_npi_num
  description: Claim Other Provider NPI Number - From claims processing system
  data_type: string
  start_pos: 343
  end_pos: 352
  length: 10
- name: clm_cntl_num
  description: Claim Control Number - Identifier assigned by claim processor
  data_type: string
  start_pos: 353
  end_pos: 392
  length: 40
- name: clm_org_cntl_num
  description: Claim Original Control Number - Unique number for original claim
  data_type: string
  start_pos: 393
  end_pos: 432
  length: 40
- name: clm_cntrctr_num
  description: Claim Contractor Number - MAC identifier
  data_type: string
  start_pos: 433
  end_pos: 437
  length: 5
medallion_layer: bronze
unity_catalog: main
fourIcli:
  category: Claim and Claim Line Feed (CCLF) Files
  fileTypeCode: 113
  filePattern: P.?????.ACO.ZC*??.D??????.T*.zip, P.?????.ACO.ZCWY??.S??????.E??????.D??????.T*.zip, P.?????.ACO.ZC*Y??.D??????.T*,
    P.?????.ACO.ZC*WY??.D??????.T*, P.?????.ACO.ZC*R??.D??????.T*
  extractZip: true
  refreshFrequency: weekly
  defaultDateFilter:
    createdWithinLastWeek: true