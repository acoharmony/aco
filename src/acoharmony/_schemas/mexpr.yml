version: 2
name: mexpr
description: 'Monthly Expenditure Report'
storage:
  tier: bronze
  file_patterns:
    reach:
    - '*MEXPR*'
  silver:
    output_name: mexpr.parquet
    refresh_frequency: monthly
file_format:
  type: excel_multi_sheet
  parser: excel_multi_sheet
  multi_output: true
  sheet_config:
    header_row: 0
    data_start_row: 1
    column_mapping_strategy: "position"
    end_marker_column: 0
    end_marker_value: ""
sheets:
  - sheet_index: 0
    sheet_type: introduction
    description: Introduction - empty documentation sheet
  - sheet_index: 1
    sheet_type: claim_type
    description: Claim Type reference data
    skip_rows: 0
  - sheet_index: 2
    sheet_type: claim_lag
    description: Claim Lag reference data
    skip_rows: 0
  - sheet_index: 3
    sheet_type: data_claims
    description: Claims expenditure data by month
    skip_rows: 0
  - sheet_index: 4
    sheet_type: data_enroll
    description: Enrollment data by month
    skip_rows: 0
columns: []
fourIcli:
  category: Reports
  fileTypeCode: 214
  extractZip: false
  refreshFrequency: monthly
  filePattern: REACH.D????.MEXPR.??.PY????.D??????.T*.xlsx
