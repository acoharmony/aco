version: 2
name: cclfb
description: CCLFB Part B Claims Benefit Enhancement and Demonstration Code File -
  Fixed-width file containing Part B benefit enhancement indicators and demonstration
  codes
storage:
  tier: bronze
  file_patterns:
    mssp: P.A*.ACO.ZCBY*.D*.T*
    reach: P.D*.ACO.ZCBY*.D*.T*
    mssp_regular: P.A*.ACO.ZCBY*.D*.T*
    mssp_runout: P.A*.ACO.ZCBR*.D*.T*
    reach_monthly: P.D*.ACO.ZCBY*.D*.T*
    reach_runout: P.D*.ACO.ZCBR*.D*.T*
    mssp_weekly: P.A*.ACO.ZCBWY*.D*.T*
  silver:
    output_name: cclfb.parquet
    refresh_frequency: weekly
    last_updated_by: scripts/process_raw_to_parquet.py
  gold:
    output_name: null
    refresh_frequency: null
    last_updated_by: null
file_format:
  type: fixed_width
  encoding: utf-8
  record_length: 128
columns:
- name: cur_clm_uniq_id
  description: Current Claim Unique Identifier - A unique identification number assigned
    to the claim
  data_type: string
  start_pos: 1
  end_pos: 13
  length: 13
  required: true
- name: clm_line_num
  description: Claim Line Number - A sequential number that identifies a specific
    claim line within a given claim
  data_type: string
  start_pos: 14
  end_pos: 23
  length: 10
  required: true
- name: bene_mbi_id
  description: Medicare Beneficiary Identifier - A Medicare Beneficiary Identifier
    assigned to a beneficiary
  data_type: string
  start_pos: 24
  end_pos: 34
  length: 11
  required: true
- name: bene_hic_num
  description: Beneficiary HIC Number - Legacy Beneficiary HICN field
  data_type: string
  start_pos: 35
  end_pos: 45
  length: 11
- name: clm_type_cd
  description: Claim Type Code - Type of claim (71=RIC O local carrier non-DMEPOS,
    72=RIC O local carrier DMEPOS)
  data_type: string
  start_pos: 46
  end_pos: 47
  length: 2
- name: clm_line_ngaco_pbpmt_sw
  description: PBP Benefit Enhancement Indicator - Y/N indicates PBP benefit enhancement
    (used for NGACO and VTAPM)
  data_type: string
  start_pos: 48
  end_pos: 48
  length: 1
- name: clm_line_ngaco_pdschrg_hcbs_sw
  description: Post Discharge Home Visit Benefit Enhancement Indicator - Y/N indicates
    Post Discharge Home Visit enhancement
  data_type: string
  start_pos: 49
  end_pos: 49
  length: 1
- name: clm_line_ngaco_snf_wvr_sw
  description: SNF 3-Day Waiver Benefit Enhancement Indicator - Y/N indicates SNF
    3-Day Waiver enhancement
  data_type: string
  start_pos: 50
  end_pos: 50
  length: 1
- name: clm_line_ngaco_tlhlth_sw
  description: Telehealth Benefit Enhancement Indicator - Y/N indicates Telehealth
    enhancement
  data_type: string
  start_pos: 51
  end_pos: 51
  length: 1
- name: clm_line_ngaco_cptatn_sw
  description: AIPBP Benefit Enhancement Indicator - Y/N indicates AIPBP enhancement
  data_type: string
  start_pos: 52
  end_pos: 52
  length: 1
- name: clm_demo_1st_num
  description: First Program Demonstration Number - Medicare Demonstration Special
    Processing Number for BPCI
  data_type: string
  start_pos: 53
  end_pos: 54
  length: 2
- name: clm_demo_2nd_num
  description: Second Program Demonstration Number - Medicare Demonstration Special
    Processing Number
  data_type: string
  start_pos: 55
  end_pos: 56
  length: 2
- name: clm_demo_3rd_num
  description: Third Program Demonstration Number - Medicare Demonstration Special
    Processing Number
  data_type: string
  start_pos: 57
  end_pos: 58
  length: 2
- name: clm_demo_4th_num
  description: Fourth Program Demonstration Number - Medicare Demonstration Special
    Processing Number
  data_type: string
  start_pos: 59
  end_pos: 60
  length: 2
- name: clm_demo_5th_num
  description: Fifth Program Demonstration Number - Medicare Demonstration Special
    Processing Number
  data_type: string
  start_pos: 61
  end_pos: 62
  length: 2
- name: clm_pbp_inclsn_amt
  description: PBP/AIPBP Inclusion Amount - Amount that would have been paid without
    PBP/AIPBP reduction
  data_type: decimal
  start_pos: 63
  end_pos: 77
  length: 15
  precision: 2
- name: clm_pbp_rdctn_amt
  description: PBP/AIPBP Reduction Amount - Amount withheld from payment to provider
  data_type: decimal
  start_pos: 78
  end_pos: 92
  length: 15
  precision: 2
- name: clm_ngaco_cmg_wvr_sw
  description: Care Management Home Visits - Y/N indicates Care Management Home Visits
    enhancement
  data_type: string
  start_pos: 93
  end_pos: 93
  length: 1
- name: clm_mdcr_ddctbl_amt
  description: Claim Medicare Deductible Amount - Medicare deductible amount billed
    to Medicaid
  data_type: decimal
  start_pos: 94
  end_pos: 112
  length: 19
  precision: 2
- name: clm_sqstrtn_rdctn_amt
  description: Part B Sequestration Reduction Amount - Payment reduction amount (2%
    since 04/01/2013)
  data_type: decimal
  start_pos: 113
  end_pos: 127
  length: 15
  precision: 2
- name: clm_line_carr_hpsa_scrcty_cd
  description: Claim Line Carrier HPSA Scarcity Code - Tracks Health Professional
    Shortage Area bonus payments
  data_type: string
  start_pos: 128
  end_pos: 128
  length: 1
keys:
  primary_key:
  - cur_clm_uniq_id
  - clm_line_num
  natural_key:
  - cur_clm_uniq_id
  - clm_line_num
  - bene_mbi_id
  foreign_keys:
  - column: cur_clm_uniq_id
    references: cclf5.cur_clm_uniq_id
  - column: clm_line_num
    references: cclf5.clm_line_num
  - column: bene_mbi_id
    references: beneficiary_demographics.bene_mbi_id
medallion_layer: bronze
unity_catalog: main
fourIcli:
  category: Claim and Claim Line Feed (CCLF) Files
  fileTypeCode: 113
  filePattern: P.?????.ACO.ZC*??.D??????.T*.zip, P.?????.ACO.ZCWY??.S??????.E??????.D??????.T*.zip, P.?????.ACO.ZC*Y??.D??????.T*, P.?????.ACO.ZC*WY??.D??????.T*, P.?????.ACO.ZC*R??.D??????.T*
  extractZip: true
  refreshFrequency: weekly
  defaultDateFilter:
    createdWithinLastWeek: true
