name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run coverage run -m pytest src/acoharmony/_test/ --no-cov -q --tb=short

      - name: Generate coverage report
        id: coverage
        run: |
          uv run coverage report --show-missing | tee /tmp/coverage-report.txt
          uv run coverage xml -o .dev/coverage.xml
          # Extract percentage for badge from TOTAL line (not the last line which may be "N empty files skipped.")
          COV_PCT=$(grep '^TOTAL' /tmp/coverage-report.txt | awk '{print $NF}' | tr -d '%')
          echo "pct=${COV_PCT}" >> "$GITHUB_OUTPUT"
          if [ "$COV_PCT" = "100" ]; then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif [ "$COV_PCT" -ge 90 ]; then echo "color=green" >> "$GITHUB_OUTPUT"
          elif [ "$COV_PCT" -ge 80 ]; then echo "color=yellow" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

      - name: Upload coverage to Codecov
        # codecov/codecov-action@v6.0.0 has a bug where the `upload-coverage`
        # subcommand receives a spurious `--repo` flag and dies with:
        #   Error: No such option: --repo
        # Invoking the CLI directly with `upload-process` (the canonical form
        # per https://docs.codecov.com/docs/codecov-uploader) sidesteps it.
        # The step is gated on the token secret and tolerant of upload
        # failures — CI doesn't fail if Codecov is flaky.
        if: always() && env.CODECOV_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          set +e
          curl -fsSL https://cli.codecov.io/latest/linux/codecov -o codecov
          chmod +x codecov
          ./codecov --verbose upload-process \
            --disable-search \
            --token "${CODECOV_TOKEN}" \
            --name "ci-${{ github.run_id }}" \
            --file .dev/coverage.xml \
            --git-service github
          echo "Codecov upload exit code: $?"
          exit 0

      - name: Coverage badge
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.pct }}%
          color: ${{ steps.coverage.outputs.color }}
