name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run coverage run -m pytest src/acoharmony/_test/ --no-cov -q --tb=short

      - name: Generate coverage report
        id: coverage
        run: |
          uv run coverage report --show-missing | tee /tmp/coverage-report.txt
          uv run coverage xml -o .dev/coverage.xml
          # Extract percentage for badge (idempotent — reads from report output)
          COV_PCT=$(tail -1 /tmp/coverage-report.txt | awk '{print $NF}' | tr -d '%')
          echo "pct=${COV_PCT}" >> "$GITHUB_OUTPUT"
          if [ "$COV_PCT" = "100" ]; then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif [ "$COV_PCT" -ge 90 ]; then echo "color=green" >> "$GITHUB_OUTPUT"
          elif [ "$COV_PCT" -ge 80 ]; then echo "color=yellow" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: .dev/coverage.xml
          fail_ci_if_error: false

      - name: Coverage badge
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.pct }}%
          color: ${{ steps.coverage.outputs.color }}
