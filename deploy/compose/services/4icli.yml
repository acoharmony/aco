services:
  4icli:
    build:
      context: ../images/4icli
      dockerfile: Dockerfile
    image: ghcr.io/acoharmony/4icli:latest
    pull_policy: build  # Always build locally
    container_name: 4icli
    restart: unless-stopped
    user: "1002:1002"
    environment:
      - ACO_PROFILE=${ACO_PROFILE:-dev}
      - FOURICLI_API_KEY=${FOURICLI_API_KEY}
      - FOURICLI_API_SECRET=${FOURICLI_API_SECRET}
      - FOURICLI_APM_ID=${FOURICLI_APM_ID}
    volumes:
      # Profile configuration (for profile-aware path resolution)
      #- type: bind
      #  source: ../../src/acoharmony/_config
      #  target: /home/care/acoharmony/src/acoharmony/_config
      #  read_only: true
      #  bind:
      #    create_host_path: false

      # S3-backed workspace - same mount as aco container
      # Profile config (storage.data_path) determines subdirectory usage
      - type: bind
        source: /opt/s3/data/workspace
        target: /opt/s3/data/workspace
        read_only: false
        bind:
          create_host_path: true

      # 4icli config.txt with API credentials
      - type: bind
        source: ../conf/4icli/config.txt
        target: /opt/s3/data/workspace/bronze/config.txt
        read_only: false
        bind:
          create_host_path: false

    # Working directory matches profile's bronze_dir (data_path/bronze)
    working_dir: /opt/s3/data/workspace/bronze
    networks:
      - acoharmony-external
    stdin_open: true
    tty: true
    entrypoint: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M
    labels:
      - "aco.network=bridge"
      - "aco.type=cli"
      - "aco.profile-aware=true"
