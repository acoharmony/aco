services:
  aco:
    build:
      context: ../images/uv
      dockerfile: Dockerfile
    image: ghcr.io/acoharmony/uv:latest
    pull_policy: build  # Always build locally
    container_name: aco
    networks:
      - acoharmony-internal  # For service communication
      - acoharmony-external  # For host port exposure
    volumes:
      - /opt/s3/data/workspace:/opt/s3/data/workspace  # Data storage
      - uv:/uv-cache  # UV cache directory (named volume)
    env_file:
      - ../.env
    environment:
      - ACO_PROFILE=dev  # Use dev profile
      - UV_CACHE_DIR=/uv-cache
    working_dir: /app
    command:
      - uv
      - run
      - --with
      - acoharmony==0.1.1
      - aco
      - --help
    labels:
      - "aco.network=bridge"  # Uses bridge networks
      - "aco.type=service"  # Service container

volumes:
  uv:
    external: true
