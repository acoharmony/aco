[experimental]

[keymap]
preset = "default"
[keymap.overrides]

[runtime]
auto_instantiate = true
auto_reload = "off"
# pythonpath should be directories with Python code, not data directories
pythonpath = ["/opt/s3/data/notebooks", "/home/care/acoharmony"]
on_cell_change = "autorun"
watcher_on_save = "lazy"
std_stream_max_bytes = 1000000
output_max_bytes = 10000000

[package_management]
manager = "uv"

[save]
autosave = "after_delay"
format_on_save = false
autosave_delay = 1000


[snippets]
custom_paths = []
include_default_snippets = true

[formatting]
line_length = 79

[display]
theme = "light"
code_editor_font_size = 14
default_width = "medium"
dataframes = "rich"
cell_output = "above"
custom_css = []  # List of paths to custom CSS files (if adding paths, use list format: ["/path/to/file.css"])

[server]
browser = "default"
follow_symlink = false
