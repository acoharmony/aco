services:
  4icli:
    build:
      context: ../images/4icli
      dockerfile: Dockerfile
    image: ghcr.io/acoharmony/4icli:latest
    pull_policy: build  # Always build locally
    container_name: 4icli
    restart: unless-stopped
    user: "1002:1002"
    environment:
      - ACO_PROFILE=${ACO_PROFILE:-dev}
      - FOURICLI_API_KEY=${FOURICLI_API_KEY}
      - FOURICLI_API_SECRET=${FOURICLI_API_SECRET}
      - FOURICLI_APM_ID=${FOURICLI_APM_ID}
    volumes:
      # NOTE: no host config.txt bind-mount. 4icli's config.txt is a
      # machine-bound encrypted blob — the decryption key is derived
      # from environment identifiers that differ between host and
      # container, so mounting a host-generated config.txt produces
      # "Authentication failed" when the container tries to decrypt it.
      # Instead, the entrypoint runs `4icli configure` inside the
      # container on start, driving it with FOURICLI_API_KEY /
      # FOURICLI_API_SECRET (set via env below). That produces a
      # container-local config.txt that 4icli can actually decrypt.

      # S3-backed workspace — same mount as aco container.
      - type: bind
        source: /opt/s3/data/workspace
        target: /opt/s3/data/workspace
        read_only: false
        bind:
          create_host_path: true

    # Working directory matches profile's bronze_dir (data_path/bronze)
    working_dir: /opt/s3/data/workspace/bronze
    networks:
      - acoharmony-external
    stdin_open: true
    tty: true
    # Entrypoint comes from the image — it configures 4icli from env vars,
    # then execs the command below to keep the container alive for `docker exec`.
    command: ["tail", "-f", "/dev/null"]
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M
    labels:
      - "aco.network=bridge"
      - "aco.type=cli"
      - "aco.profile-aware=true"
