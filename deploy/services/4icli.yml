services:
  4icli:
    build:
      context: ../images/4icli
      dockerfile: Dockerfile
    image: ghcr.io/acoharmony/4icli:latest
    pull_policy: build  # Always build locally
    container_name: 4icli
    restart: unless-stopped
    user: "1002:1002"
    environment:
      - ACO_PROFILE=${ACO_PROFILE:-dev}
      - FOURICLI_API_KEY=${FOURICLI_API_KEY}
      - FOURICLI_API_SECRET=${FOURICLI_API_SECRET}
      - FOURICLI_APM_ID=${FOURICLI_APM_ID}
    volumes:
      # Host-side 4icli creds (written by `4icli configure` on the host).
      # Mounting RO into the container's XDG config path means the binary
      # picks up the host creds directly — no in-container configure needed.
      - type: bind
        source: /home/care/.config/4icli/config.txt
        target: /home/care/.config/4icli/config.txt
        read_only: true

      # S3-backed workspace — same mount as aco container.
      - type: bind
        source: /opt/s3/data/workspace
        target: /opt/s3/data/workspace
        read_only: false
        bind:
          create_host_path: true

    # Working directory matches profile's bronze_dir (data_path/bronze)
    working_dir: /opt/s3/data/workspace/bronze
    networks:
      - acoharmony-external
    stdin_open: true
    tty: true
    # Entrypoint comes from the image — it configures 4icli from env vars,
    # then execs the command below to keep the container alive for `docker exec`.
    command: ["tail", "-f", "/dev/null"]
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M
    labels:
      - "aco.network=bridge"
      - "aco.type=cli"
      - "aco.profile-aware=true"
