services:
  4icli:
    build:
      context: ../images/4icli
      dockerfile: Dockerfile
    image: ghcr.io/acoharmony/4icli:latest
    container_name: 4icli
    restart: unless-stopped
    user: "1002:1002"
    environment:
      - ACO_PROFILE=${ACO_PROFILE:-dev}
      - FOURICLI_APM_ID=${FOURICLI_APM_ID}
    volumes:
      # config.txt is bootstrapped out-of-band by
      # deploy/images/4icli/bootstrap.sh after a portal-issued key/secret
      # rotation. The runtime container never calls `4icli configure` or
      # `4icli rotate` — it only reads $BRONZE/config.txt, which arrives
      # via this workspace mount, and copies it to the XDG path at start.
      # No FOURICLI_API_KEY / FOURICLI_API_SECRET env wiring on purpose:
      # past versions used those to auto-`configure` on container start,
      # which silently produced dead-on-arrival creds and overwrote the
      # workspace source of truth.

      # S3-backed workspace — same mount as aco container.
      - type: bind
        source: /opt/s3/data/workspace
        target: /opt/s3/data/workspace
        read_only: false
        bind:
          create_host_path: true

    # Working directory matches profile's bronze_dir (data_path/bronze)
    working_dir: /opt/s3/data/workspace/bronze
    networks:
      - acoharmony-external
    stdin_open: true
    tty: true
    # Entrypoint comes from the image — it configures 4icli from env vars,
    # then execs the command below to keep the container alive for `docker exec`.
    command: ["tail", "-f", "/dev/null"]
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M
    labels:
      - "aco.network=bridge"
      - "aco.type=cli"
      - "aco.profile-aware=true"
