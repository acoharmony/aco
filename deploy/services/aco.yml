services:
  aco:
    build:
      context: ../images/uv
      dockerfile: Dockerfile
    image: ghcr.io/acoharmony/uv:latest
    container_name: aco
    networks:
      - acoharmony-internal  # For service communication
      - acoharmony-external  # For host port exposure
    volumes:
      - /opt/s3/data/workspace:/opt/s3/data/workspace  # Data storage
    env_file:
      - ../.env
    environment:
      - ACO_PROFILE=dev  # Use dev profile
    working_dir: /app
    command:
      - uv
      - run
      - --with
      - acoharmony
      - aco
      - --help
    labels:
      - "aco.network=bridge"  # Uses bridge networks
      - "aco.type=service"  # Service container
